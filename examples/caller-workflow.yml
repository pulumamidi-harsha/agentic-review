# ────────────────────────────────────────────────────────────────────────────────
# AI PR Review — Drop this file into ANY repo's .github/workflows/
# That's it. No other configuration needed. AI detects your stack automatically.
# ────────────────────────────────────────────────────────────────────────────────
name: AI PR Review

on:
  pull_request:
    branches: [main, dev]

jobs:
  ai-review:
    uses: bayer-int/agentic-review/.github/workflows/ai-review.yml@main
    secrets:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
