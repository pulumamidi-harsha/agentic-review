# ────────────────────────────────────────────────────────────────────────────────
# AI PR Review — Drop this file into ANY repo's .github/workflows/
# That's it. No other configuration needed. AI detects your stack automatically.
#
# Required secrets (set at org or repo level):
#   - AI_API_KEY: MGA/OpenAI API key
#   - AI_API_ENDPOINT: LLM endpoint URL
#   - ORG_PAT: Org-level PAT with repo read access (also used for SonarQube results)
#
# Optional secrets:
#   - ARTIFACTORY_USERNAME: Bayer Artifactory username (for Docker builds needing private packages)
#   - ARTIFACTORY_AUTH_TOKEN: Bayer Artifactory auth token (auto-mapped to Dockerfile ARGs)
#
# SonarQube: Results are automatically picked up from existing SonarQube check runs
# on the PR (no SONAR_TOKEN needed — uses GitHub Checks API via ORG_PAT).
# ────────────────────────────────────────────────────────────────────────────────
name: AI PR Review

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    uses: bayer-int/agentic-review/.github/workflows/ai-review.yml@main
    secrets:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
      ORG_PAT: ${{ secrets.ORG_REPOS_INTERNAL_READ_ONLY }}
      ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
      ARTIFACTORY_AUTH_TOKEN: ${{ secrets.ARTIFACTORY_AUTH_TOKEN }}
