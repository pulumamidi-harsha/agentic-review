# ────────────────────────────────────────────────────────────────────────────────
# AI PR Review — Drop this file into ANY repo's .github/workflows/
# That's it. No other configuration needed. AI detects your stack automatically.
#
# Required secrets (set at org or repo level):
#   - AI_API_KEY: MGA/OpenAI API key
#   - AI_API_ENDPOINT: LLM endpoint URL
#   - ORG_PAT: Org-level PAT with repo read access
#
# Optional secrets:
#   - ARTIFACTORY_USERNAME: Bayer Artifactory username (for private npm packages)
#   - ARTIFACTORY_AUTH_TOKEN: Bayer Artifactory auth token
#
# SonarQube Integration:
#   If your repo has a SonarQube job, AI review automatically picks up its results
#   via GitHub Checks API. No SONAR_TOKEN needed — just ensure SonarQube runs on PRs.
# ────────────────────────────────────────────────────────────────────────────────
name: AI PR Review

on:
  pull_request:
    branches: [main, dev]

jobs:
  ai-review:
    uses: bayer-int/agentic-review/.github/workflows/ai-review.yml@main
    secrets:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
      ORG_PAT: ${{ secrets.ORG_REPOS_INTERNAL_READ_ONLY }}
      ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
      ARTIFACTORY_AUTH_TOKEN: ${{ secrets.ARTIFACTORY_AUTH_TOKEN }}
