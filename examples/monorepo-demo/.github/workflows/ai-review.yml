# AI PR Review — monorepo demo (Node + Python + Terraform)
name: AI PR Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    uses: pulumamidi-harsha/agentic-review/.github/workflows/ai-review.yml@068f5516defe11975c593d4c6592b7e7657f6152
    with:
      review_type: quick
      pipeline_repository: pulumamidi-harsha/agentic-review
      pipeline_ref: 068f5516defe11975c593d4c6592b7e7657f6152
    secrets:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
      # Optional for public pipeline repo — falls back to github.token in the workflow
      ORG_PAT: ${{ secrets.ORG_PAT || github.token }}
