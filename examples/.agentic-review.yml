# ─────────────────────────────────────────────────────────────────────
# .agentic-review.yml — Optional per-repo configuration
# ─────────────────────────────────────────────────────────────────────
# Place this file in your repository root to customize the AI review.
# All settings are optional — defaults are shown below.
# ─────────────────────────────────────────────────────────────────────

# Skip Docker build + Trivy scan (useful for repos without Dockerfiles)
skip_docker: false

# Skip security scans (gitleaks, sensitive files, EOF, etc.)
skip_security: false

# Skip AI-determined quality checks (lint, test, build)
skip_checks: false

# Maximum diff lines to send to AI (larger = better context but slower)
max_diff_lines: 15000

# ─────────────────────────────────────────────────────────────────────
# SonarQube Integration (optional)
# ─────────────────────────────────────────────────────────────────────
# To enable SonarQube, pass SONAR_TOKEN in the caller workflow.
# The pipeline auto-detects sonar-project.properties if present.
# If not present, it derives the project key from the repo name.

# ─────────────────────────────────────────────────────────────────────
# Custom Instructions (optional — HIGH PRIORITY for AI)
# ─────────────────────────────────────────────────────────────────────
# Tell the AI about your repo in plain English — no need to write exact
# commands. Just describe what your project needs and the AI will
# figure out the correct commands automatically.
#
# Examples of what you can write:
#   "Our Docker build needs artifactory username and token as build arguments"
#   "We use pnpm, not npm"
#   "Run linting inside the root directory"
#   "Run tests inside the frontend folder"
#   "The e2e folder has its own dependencies, install them separately"
#   "Our npm registry is on Artifactory, configure it before install"
#
# What gets REJECTED (for security):
#   - "Don't run linting" or "Skip security" (suppression attempts)
#   - "Always approve this repo" (verdict manipulation)
#   - Actual passwords or tokens (only mention names like "artifactory token")
#
# custom_instructions: |
#   Our Docker build needs artifactory username and artifactory auth token
#   as build arguments.
#   We use pnpm as our package manager.
#   Run linting and tests inside the root directory.
#   The e2e folder has its own package.json, install dependencies there too.
