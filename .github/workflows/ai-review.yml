name: AI PR Review

on:
  workflow_call:
    inputs:
      review_type:
        description: 'Type of review: full, security'
        required: false
        type: string
        default: 'full'
    secrets:
      AI_API_KEY:
        description: 'API key for LLM (MGA/OpenAI/Azure OpenAI)'
        required: true
      AI_API_ENDPOINT:
        description: 'LLM API endpoint URL'
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 25

    concurrency:
      group: ai-review-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout AI prompts
        uses: actions/checkout@v4
        with:
          repository: bayer-int/agentic-review
          ref: main
          path: .ai-prompts
          token: ${{ github.token }}

      - name: Gather repository context
        id: context
        run: |
          find . -type f \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './.ai-prompts/*' \
            -not -path './dist/*' \
            -not -path './build/*' \
            -not -path './.next/*' \
            -not -path './__pycache__/*' \
            -not -path './.venv/*' \
            -not -path './vendor/*' \
            -not -path './target/*' \
            -not -path './.gradle/*' \
            | sort | head -500 > /tmp/file-tree.txt

          git diff origin/${{ github.base_ref }}...HEAD -- . \
            ':!package-lock.json' ':!yarn.lock' ':!pnpm-lock.yaml' ':!*.lock' ':!go.sum' ':!Cargo.lock' \
            | head -15000 > /tmp/pr-diff.txt

          CONFIG_CONTENT=""
          for f in $(find . -maxdepth 3 \( \
            -name "package.json" -o -name "tsconfig.json" -o -name "pnpm-workspace.yaml" \
            -o -name "pyproject.toml" -o -name "requirements*.txt" -o -name "setup.py" \
            -o -name "go.mod" -o -name "Cargo.toml" \
            -o -name "pom.xml" -o -name "build.gradle" -o -name "build.gradle.kts" \
            -o -name "Makefile" -o -name "Dockerfile" \
            -o -name "eslint.config*" -o -name ".eslintrc*" \
            -o -name "vitest.config*" -o -name "jest.config*" -o -name "pytest.ini" \
            -o -name "nx.json" -o -name "turbo.json" \
            \) -not -path './.git/*' -not -path './node_modules/*' -not -path './.ai-prompts/*' -not -path './vendor/*' 2>/dev/null | head -15); do
            if [[ -f "$f" ]] && [[ $(wc -c < "$f") -lt 50000 ]]; then
              CONFIG_CONTENT+="
=== FILE: $f ===
$(cat "$f")

"
            fi
          done
          echo "$CONFIG_CONTENT" > /tmp/config-files.txt

      - name: "AI Pass 1: Detect stack & generate commands"
        id: pass1
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
        run: |
          if [[ -f .ai-prompts/prompts/detect-and-command.md ]]; then
            SYSTEM_PROMPT=$(cat .ai-prompts/prompts/detect-and-command.md)
          else
            SYSTEM_PROMPT='You are a senior DevOps engineer. Determine the stack and commands to run. Return ONLY valid JSON: {"stack":{"language":"...","framework":"...","package_manager":"...","package_manager_version":"...","runtime":"..."},"setup_commands":[{"cmd":"...","purpose":"..."}],"check_commands":[{"cmd":"...","purpose":"...","confidence":"high|medium|low"}],"runtime_requirements":{"node_version":"20","python_version":null,"go_version":null}}'
          fi

          FILE_TREE=$(cat /tmp/file-tree.txt)
          CONFIG_FILES=$(cat /tmp/config-files.txt)

          USER_MSG="## File Tree
${FILE_TREE:0:6000}

## Config Files
${CONFIG_FILES:0:40000}"

          RESPONSE=$(curl -s -X POST "${AI_API_ENDPOINT}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AI_API_KEY}" \
            --max-time 120 \
            -d "$(jq -n \
              --arg system "$SYSTEM_PROMPT" \
              --arg user "$USER_MSG" \
              '{
                "model": "gpt-4.1",
                "messages": [
                  {"role": "system", "content": $system},
                  {"role": "user", "content": $user}
                ],
                "temperature": 0,
                "max_tokens": 2048
              }')")

          AI_OUTPUT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [[ -z "$AI_OUTPUT" ]]; then
            echo "::warning::AI Pass 1 returned empty"
            echo '{"stack":{"language":"unknown"},"setup_commands":[],"check_commands":[],"runtime_requirements":{}}' > /tmp/ai-commands.json
          else
            CLEANED=$(echo "$AI_OUTPUT" | sed 's/^```json//;s/^```//')
            echo "$CLEANED" | jq '.' > /tmp/ai-commands.json 2>/dev/null || echo "$CLEANED" > /tmp/ai-commands.json
          fi

          echo "=== Stack ===" && jq '.stack' /tmp/ai-commands.json 2>/dev/null || true
          echo "=== Commands ===" && jq '.check_commands' /tmp/ai-commands.json 2>/dev/null || true

          NODE_VER=$(jq -r '.runtime_requirements.node_version // empty' /tmp/ai-commands.json)
          PYTHON_VER=$(jq -r '.runtime_requirements.python_version // empty' /tmp/ai-commands.json)
          GO_VER=$(jq -r '.runtime_requirements.go_version // empty' /tmp/ai-commands.json)
          echo "node_version=${NODE_VER:-}" >> "$GITHUB_OUTPUT"
          echo "python_version=${PYTHON_VER:-}" >> "$GITHUB_OUTPUT"
          echo "go_version=${GO_VER:-}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.pass1.outputs.node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.pass1.outputs.node_version }}

      - name: Install package manager
        if: steps.pass1.outputs.node_version != ''
        run: |
          PKG_MGR=$(jq -r '.stack.package_manager // empty' /tmp/ai-commands.json)
          PKG_MGR_VER=$(jq -r '.stack.package_manager_version // empty' /tmp/ai-commands.json)
          PKG_MGR_FIELD=$(jq -r '.packageManager // empty' package.json 2>/dev/null)

          case "$PKG_MGR" in
            pnpm)
              if [[ -n "$PKG_MGR_FIELD" && "$PKG_MGR_FIELD" == pnpm@* ]]; then
                VER="${PKG_MGR_FIELD#pnpm@}"; VER="${VER%%+*}"
              elif [[ -n "$PKG_MGR_VER" && "$PKG_MGR_VER" != "null" ]]; then
                VER="$PKG_MGR_VER"
              else
                VER="9"
              fi
              npm install -g "pnpm@${VER}" && pnpm --version
              ;;
            yarn)
              if [[ -n "$PKG_MGR_FIELD" && "$PKG_MGR_FIELD" == yarn@* ]]; then
                VER="${PKG_MGR_FIELD#yarn@}"; VER="${VER%%+*}"
              else
                VER="4"
              fi
              corepack enable && corepack prepare "yarn@${VER}" --activate && yarn --version
              ;;
            *) npm --version ;;
          esac

      - name: Setup Python
        if: steps.pass1.outputs.python_version != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.pass1.outputs.python_version }}

      - name: Setup Go
        if: steps.pass1.outputs.go_version != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.pass1.outputs.go_version }}

      - name: Run AI-determined checks
        id: checks
        continue-on-error: true
        run: |
          RESULTS=""
          OVERALL_EXIT=0
          PASSED_COUNT=0
          FAILED_COUNT=0

          echo "::group::Setup (dependency installation)"
          SETUP_CMDS=$(jq -r '.setup_commands[]?.cmd // empty' /tmp/ai-commands.json)
          while IFS= read -r cmd; do
            [[ -z "$cmd" ]] && continue
            echo "▶ $cmd"
            eval "$cmd" 2>&1 || echo "::warning::Setup failed: $cmd"
          done <<< "$SETUP_CMDS"
          echo "::endgroup::"

          CHECK_COUNT=$(jq '.check_commands | length' /tmp/ai-commands.json)
          for i in $(seq 0 $((CHECK_COUNT - 1))); do
            CMD=$(jq -r ".check_commands[$i].cmd" /tmp/ai-commands.json)
            PURPOSE=$(jq -r ".check_commands[$i].purpose" /tmp/ai-commands.json)
            [[ -z "$CMD" || "$CMD" == "null" ]] && continue

            echo "::group::$PURPOSE"
            echo "▶ $CMD"
            CMD_OUTPUT=$(eval "$CMD" 2>&1) && CMD_EXIT=0 || CMD_EXIT=$?

            if [[ $CMD_EXIT -ne 0 ]]; then
              OVERALL_EXIT=1
              FAILED_COUNT=$((FAILED_COUNT + 1))
              STATUS="❌ FAILED (exit $CMD_EXIT)"
            else
              PASSED_COUNT=$((PASSED_COUNT + 1))
              STATUS="✅ PASSED"
            fi

            RESULTS+="### ${PURPOSE} — ${STATUS}
\`\`\`
$ ${CMD}
${CMD_OUTPUT:0:4000}
\`\`\`

"
            echo "::endgroup::"
          done

          { echo "**Summary:** ${PASSED_COUNT} passed, ${FAILED_COUNT} failed"; echo ""; echo -e "$RESULTS"; } > /tmp/check-results.txt
          echo "exit_code=$OVERALL_EXIT" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED_COUNT" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED_COUNT" >> "$GITHUB_OUTPUT"

      - name: "AI Pass 2: Review code and results"
        id: pass2
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
        run: |
          if [[ "${{ inputs.review_type }}" == "security" && -f .ai-prompts/prompts/security-scan.md ]]; then
            SYSTEM_PROMPT=$(cat .ai-prompts/prompts/security-scan.md)
          elif [[ -f .ai-prompts/prompts/review-results.md ]]; then
            SYSTEM_PROMPT=$(cat .ai-prompts/prompts/review-results.md)
          else
            SYSTEM_PROMPT='You are a senior staff engineer reviewing a PR. Return ONLY valid JSON: {"summary":"...","verdict":"approve|request_changes|comment","confidence":0.85,"check_results_analysis":"...","issues":[],"positives":[],"suggestions":[]}'
          fi

          PR_DIFF=$(cat /tmp/pr-diff.txt)
          CHECK_RESULTS=$(cat /tmp/check-results.txt)
          CONFIG_FILES=$(cat /tmp/config-files.txt)

          USER_MSG="## PR: ${{ github.event.pull_request.title }}
Author: ${{ github.event.pull_request.user.login }}
Base: ${{ github.base_ref }} ← ${{ github.head_ref }}

## Config Files
${CONFIG_FILES:0:10000}

## Code Changes
\`\`\`diff
${PR_DIFF:0:30000}
\`\`\`

## CI Check Results
${CHECK_RESULTS:0:8000}

Review this PR."

          RESPONSE=$(curl -s -X POST "${AI_API_ENDPOINT}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AI_API_KEY}" \
            --max-time 120 \
            -d "$(jq -n \
              --arg system "$SYSTEM_PROMPT" \
              --arg user "$USER_MSG" \
              '{
                "model": "gpt-4.1",
                "messages": [
                  {"role": "system", "content": $system},
                  {"role": "user", "content": $user}
                ],
                "temperature": 0.1,
                "max_tokens": 4096
              }')")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [[ -z "$REVIEW" ]]; then
            echo '{"summary":"AI review unavailable","verdict":"comment","confidence":0,"issues":[],"positives":[],"suggestions":[]}' > /tmp/ai-review.txt
          else
            echo "$REVIEW" > /tmp/ai-review.txt
          fi

      - name: Post AI review to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = '{}', checks = 'No results', commands = {};
            try { review = fs.readFileSync('/tmp/ai-review.txt', 'utf8'); } catch(e) {}
            try { checks = fs.readFileSync('/tmp/check-results.txt', 'utf8'); } catch(e) {}
            try { commands = JSON.parse(fs.readFileSync('/tmp/ai-commands.json', 'utf8')); } catch(e) {}

            const passed = '${{ steps.checks.outputs.passed }}' || '0';
            const failed = '${{ steps.checks.outputs.failed }}' || '0';
            const checksExit = '${{ steps.checks.outputs.exit_code }}' || '0';

            let reviewData = {};
            try { reviewData = JSON.parse(review.replace(/^```json\n?/,'').replace(/\n?```$/,'')); } catch(e) { reviewData = {summary: review.substring(0,200), verdict:'comment', issues:[], positives:[], suggestions:[]}; }

            const stackInfo = commands.stack ? `${commands.stack.language||'?'} / ${commands.stack.framework||'?'} / ${commands.stack.package_manager||'?'}` : 'Unknown';
            const cmdList = (commands.check_commands||[]).map(c => `- \`${c.cmd}\` — ${c.purpose}`).join('\n');
            const verdictEmoji = {'approve':'✅','request_changes':'🔴','comment':'💬'}[reviewData.verdict] || '💬';
            const statusEmoji = checksExit === '0' ? '✅' : '⚠️';

            const issuesList = (reviewData.issues||[]).map(i => {
              const sev = {'critical':'🚨','high':'🔴','medium':'🟡','low':'🔵','info':'ℹ️'}[i.severity] || '•';
              const loc = i.file ? `\`${i.file}${i.line?':'+i.line:''}\`` : '';
              return `${sev} **${i.title}** ${loc}\n   ${i.description}${i.suggestion?'\n   💡 '+i.suggestion:''}`;
            }).join('\n\n');

            const positives = (reviewData.positives||[]).map(p => `- ✅ ${p}`).join('\n');
            const suggestions = (reviewData.suggestions||[]).map(s => `- 💡 ${s}`).join('\n');

            const body = [
              `## 🤖 AI Code Review — ${verdictEmoji} ${(reviewData.verdict||'comment').replace('_',' ').toUpperCase()}`,
              '', `> ${reviewData.summary || 'Review complete.'}`, '',
              `| Stack | Checks | Confidence |`, `|-------|--------|------------|`,
              `| ${stackInfo} | ${statusEmoji} ${passed} passed, ${failed} failed | ${Math.round((reviewData.confidence||0)*100)}% |`, '',
              reviewData.check_results_analysis ? `**CI Analysis:** ${reviewData.check_results_analysis}\n` : '',
              issuesList ? `### Issues Found\n\n${issuesList}\n` : '',
              positives ? `### What's Good\n\n${positives}\n` : '',
              suggestions ? `### Suggestions\n\n${suggestions}\n` : '',
              '<details><summary>📋 Commands AI ran</summary>\n', cmdList || '_None_', '\n</details>', '',
              '<details><summary>📊 Full Output</summary>\n', checks, '\n</details>', '',
              '---', '<sub>🔮 <a href="https://github.com/bayer-int/agentic-review">agentic-review</a> | Informational only</sub>',
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });

      - name: Pipeline complete
        if: always()
        run: echo "✅ AI review posted to PR"
