name: AI PR Review

on:
  workflow_call:
    inputs:
      review_type:
        description: 'Type of review: full, security, quick'
        required: false
        type: string
        default: 'full'
      custom_instructions:
        description: 'Repository-specific instructions for the AI reviewer'
        required: false
        type: string
        default: ''
      pipeline_repository:
        description: 'Repository containing pipeline scripts (org/repo)'
        required: false
        type: string
        default: 'pulumamidi-harsha/agentic-review'
      pipeline_ref:
        description: 'Git ref for pipeline scripts'
        required: false
        type: string
        default: 'main'
      ai_model:
        description: 'LLM model name'
        required: false
        type: string
        default: 'gpt-4.1'
      npm_registry_url:
        description: 'Optional private npm registry URL'
        required: false
        type: string
        default: 'https://artifactory.bayer.com/artifactory/api/npm/npm-platforms-engineering/'
      npm_scopes:
        description: 'Comma-separated npm scopes for private registry'
        required: false
        type: string
        default: '@monsantoit,@element'
    secrets:
      AI_API_KEY:
        required: true
      AI_API_ENDPOINT:
        required: true
      ORG_PAT:
        required: false
      ARTIFACTORY_USERNAME:
        required: false
      ARTIFACTORY_AUTH_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  AGENTIC_TMP: /tmp/agentic-review
  PIPELINE_DIR: /tmp/agentic-review-pipeline
  REVIEW_TYPE: ${{ inputs.review_type }}
  INPUT_REVIEW_TYPE: ${{ inputs.review_type }}
  INPUT_CUSTOM_INSTRUCTIONS: ${{ inputs.custom_instructions }}
  AI_MODEL: ${{ inputs.ai_model }}
  NPM_REGISTRY_URL: ${{ inputs.npm_registry_url }}
  NPM_SCOPES: ${{ inputs.npm_scopes }}
  GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
  GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
  GITHUB_EVENT_PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
  PR_TITLE: ${{ github.event.pull_request.title }}
  PR_AUTHOR: ${{ github.event.pull_request.user.login }}

jobs:
  gate:
    name: Check skip label
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.skip_check.outputs.skip }}
    steps:
      - id: skip_check
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request?.labels?.map(l => l.name) || [];
            const skip = labels.includes('skip-ai-review') || labels.includes('no-review');
            if (skip) core.info('Skipping AI review — PR has skip label');
            core.setOutput('skip', skip.toString());

  prepare:
    name: Prepare context and AI Pass 1
    needs: gate
    if: needs.gate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      review_type: ${{ steps.config.outputs.review_type }}
      skip_docker: ${{ steps.config.outputs.skip_docker }}
      skip_security: ${{ steps.config.outputs.skip_security }}
      skip_checks: ${{ steps.config.outputs.skip_checks }}
      max_diff_lines: ${{ steps.config.outputs.max_diff_lines }}
      pr_size: ${{ steps.context.outputs.pr_size }}
      diff_lines: ${{ steps.context.outputs.diff_lines }}
      changed_files: ${{ steps.context.outputs.changed_files }}
      pr_scope: ${{ steps.context.outputs.pr_scope }}
      has_dockerfile: ${{ steps.context.outputs.has_dockerfile }}
      node_version: ${{ steps.pass1.outputs.node_version }}
      python_version: ${{ steps.pass1.outputs.python_version }}
      go_version: ${{ steps.pass1.outputs.go_version }}
      ruby_version: ${{ steps.pass1.outputs.ruby_version }}
      java_version: ${{ steps.pass1.outputs.java_version }}
      dotnet_version: ${{ steps.pass1.outputs.dotnet_version }}
      php_version: ${{ steps.pass1.outputs.php_version }}
      elixir_version: ${{ steps.pass1.outputs.elixir_version }}
      terraform_version: ${{ steps.pass1.outputs.terraform_version }}
    steps:
      - name: Checkout PR repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone pipeline scripts
        env:
          PIPELINE_TOKEN: ${{ secrets.ORG_PAT || github.token }}
          PIPELINE_REPO: ${{ inputs.pipeline_repository }}
          PIPELINE_REF: ${{ inputs.pipeline_ref }}
        run: |
          rm -rf "$PIPELINE_DIR"
          git clone "https://x-access-token:${PIPELINE_TOKEN}@github.com/${PIPELINE_REPO}.git" "$PIPELINE_DIR"
          git -C "$PIPELINE_DIR" checkout "$PIPELINE_REF"

      - name: Start review timer
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Load repo configuration
        id: config
        run: bash "$PIPELINE_DIR/scripts/load-config.sh"

      - name: Validate custom instructions
        run: bash "$PIPELINE_DIR/scripts/validate-payload.sh"

      - name: Gather repository context
        id: context
        env:
          MAX_DIFF_LINES: ${{ steps.config.outputs.max_diff_lines }}
        run: bash "$PIPELINE_DIR/scripts/gather-context.sh"

      - name: AI Pass 1 — detect stack and commands
        id: pass1
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
          MAX_DIFF_LINES: ${{ steps.config.outputs.max_diff_lines }}
          PR_SIZE: ${{ steps.context.outputs.pr_size }}
          DIFF_LINES: ${{ steps.context.outputs.diff_lines }}
          CHANGED_FILES: ${{ steps.context.outputs.changed_files }}
        run: bash "$PIPELINE_DIR/scripts/ai-pass1.sh"

      - name: Save timer for duration
        run: echo "${{ steps.timer.outputs.start }}" > ${{ runner.temp }}/timer.txt

      - name: Upload prepare artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentic-prepare
          path: ${{ env.AGENTIC_TMP }}/
          retention-days: 1

      - name: Upload timer artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentic-timer
          path: ${{ runner.temp }}/timer.txt
          retention-days: 1

  checks:
    name: Quality checks and dependency audit
    needs: [gate, prepare]
    if: needs.gate.outputs.skip != 'true' && needs.prepare.outputs.skip_checks != 'true' && needs.prepare.outputs.review_type != 'security'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      passed: ${{ steps.run_checks.outputs.passed }}
      failed: ${{ steps.run_checks.outputs.failed }}
      exit_code: ${{ steps.run_checks.outputs.exit_code }}
      setup_failed: ${{ steps.run_checks.outputs.setup_failed }}
    steps:
      - name: Checkout PR repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone pipeline scripts
        env:
          PIPELINE_TOKEN: ${{ secrets.ORG_PAT || github.token }}
          PIPELINE_REPO: ${{ inputs.pipeline_repository }}
          PIPELINE_REF: ${{ inputs.pipeline_ref }}
        run: |
          rm -rf "$PIPELINE_DIR"
          git clone "https://x-access-token:${PIPELINE_TOKEN}@github.com/${PIPELINE_REPO}.git" "$PIPELINE_DIR"
          git -C "$PIPELINE_DIR" checkout "$PIPELINE_REF"

      - name: Download prepare artifacts
        uses: actions/download-artifact@v4
        with:
          name: agentic-prepare
          path: ${{ env.AGENTIC_TMP }}

      # No setup-node dependency cache — cache requires npm/yarn lockfiles and breaks pnpm-only repos.
      # Pass 1 setup_commands install deps (pnpm install, npm ci, etc.) in run-checks.sh.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        if: needs.prepare.outputs.node_version != ''
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}

      - name: Install package manager
        if: needs.prepare.outputs.node_version != ''
        run: |
          PKG_MGR=$(jq -r '.stack.package_manager // empty' "${AGENTIC_TMP}/ai-commands.json")
          PKG_MGR_VER=$(jq -r '.stack.package_manager_version // empty' "${AGENTIC_TMP}/ai-commands.json")
          PKG_MGR_FIELD=$(jq -r '.packageManager // empty' package.json 2>/dev/null)
          case "$PKG_MGR" in
            pnpm)
              VER="9"
              [[ -n "$PKG_MGR_FIELD" && "$PKG_MGR_FIELD" == pnpm@* ]] && VER="${PKG_MGR_FIELD#pnpm@}" && VER="${VER%%+*}"
              [[ -n "$PKG_MGR_VER" && "$PKG_MGR_VER" != "null" ]] && VER="$PKG_MGR_VER"
              npm install -g "pnpm@${VER}"
              ;;
            yarn)
              VER="4"
              [[ -n "$PKG_MGR_FIELD" && "$PKG_MGR_FIELD" == yarn@* ]] && VER="${PKG_MGR_FIELD#yarn@}" && VER="${VER%%+*}"
              corepack enable && corepack prepare "yarn@${VER}" --activate
              ;;
          esac

      - name: Configure private registry
        if: needs.prepare.outputs.node_version != ''
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_AUTH_TOKEN: ${{ secrets.ARTIFACTORY_AUTH_TOKEN }}
        run: bash "$PIPELINE_DIR/scripts/configure-npm-registry.sh"

      - name: Setup Python
        uses: actions/setup-python@v5
        if: needs.prepare.outputs.python_version != ''
        with:
          python-version: ${{ needs.prepare.outputs.python_version }}
          cache: pip

      - name: Setup Go
        uses: actions/setup-go@v5
        if: needs.prepare.outputs.go_version != ''
        with:
          go-version: ${{ needs.prepare.outputs.go_version }}
          cache-dependency-path: go.sum

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        if: needs.prepare.outputs.ruby_version != ''
        with:
          ruby-version: ${{ needs.prepare.outputs.ruby_version }}
          bundler-cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        if: needs.prepare.outputs.java_version != ''
        with:
          distribution: temurin
          java-version: ${{ needs.prepare.outputs.java_version }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        if: needs.prepare.outputs.dotnet_version != ''
        with:
          dotnet-version: ${{ needs.prepare.outputs.dotnet_version }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        if: needs.prepare.outputs.php_version != ''
        with:
          php-version: ${{ needs.prepare.outputs.php_version }}
          tools: composer

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        if: needs.prepare.outputs.elixir_version != ''
        with:
          elixir-version: ${{ needs.prepare.outputs.elixir_version }}
          otp-version: '26'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        if: needs.prepare.outputs.terraform_version != ''
        with:
          terraform_version: ${{ needs.prepare.outputs.terraform_version }}

      - name: Run quality checks
        id: run_checks
        continue-on-error: true
        run: bash "$PIPELINE_DIR/scripts/run-checks.sh"

      - name: Dependency audit
        if: needs.prepare.outputs.review_type != 'quick'
        continue-on-error: true
        run: bash "$PIPELINE_DIR/scripts/run-dep-audit.sh"

      - name: Upload checks artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentic-checks
          path: ${{ env.AGENTIC_TMP }}/
          retention-days: 1

  scans:
    name: Security and hygiene scans
    needs: [gate, prepare]
    if: needs.gate.outputs.skip != 'true' && needs.prepare.outputs.skip_security != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      security_exit: ${{ steps.security.outputs.security_exit }}
    steps:
      - name: Checkout PR repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone pipeline scripts
        env:
          PIPELINE_TOKEN: ${{ secrets.ORG_PAT || github.token }}
          PIPELINE_REPO: ${{ inputs.pipeline_repository }}
          PIPELINE_REF: ${{ inputs.pipeline_ref }}
        run: |
          rm -rf "$PIPELINE_DIR"
          git clone "https://x-access-token:${PIPELINE_TOKEN}@github.com/${PIPELINE_REPO}.git" "$PIPELINE_DIR"
          git -C "$PIPELINE_DIR" checkout "$PIPELINE_REF"

      - name: Download prepare artifacts
        uses: actions/download-artifact@v4
        with:
          name: agentic-prepare
          path: ${{ env.AGENTIC_TMP }}

      - name: Run security scans
        id: security
        continue-on-error: true
        run: bash "$PIPELINE_DIR/scripts/run-security.sh"

      - name: Dependency audit (security mode)
        if: needs.prepare.outputs.review_type == 'security'
        continue-on-error: true
        run: bash "$PIPELINE_DIR/scripts/run-dep-audit.sh"

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentic-scans
          path: ${{ env.AGENTIC_TMP }}/
          retention-days: 1

  docker:
    name: Docker build and Trivy
    needs: [gate, prepare]
    if: needs.gate.outputs.skip != 'true' && needs.prepare.outputs.has_dockerfile == 'true' && needs.prepare.outputs.skip_docker != 'true' && needs.prepare.outputs.review_type != 'quick'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      docker_found: ${{ steps.docker_step.outputs.docker_found }}
      docker_exit: ${{ steps.docker_step.outputs.docker_exit }}
    steps:
      - name: Checkout PR repository
        uses: actions/checkout@v4

      - name: Clone pipeline scripts
        env:
          PIPELINE_TOKEN: ${{ secrets.ORG_PAT || github.token }}
          PIPELINE_REPO: ${{ inputs.pipeline_repository }}
          PIPELINE_REF: ${{ inputs.pipeline_ref }}
        run: |
          rm -rf "$PIPELINE_DIR"
          git clone "https://x-access-token:${PIPELINE_TOKEN}@github.com/${PIPELINE_REPO}.git" "$PIPELINE_DIR"
          git -C "$PIPELINE_DIR" checkout "$PIPELINE_REF"

      - name: Download prepare artifacts
        uses: actions/download-artifact@v4
        with:
          name: agentic-prepare
          path: ${{ env.AGENTIC_TMP }}

      - name: Docker build and Trivy scan
        id: docker_step
        continue-on-error: true
        env:
          SECRET_ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          SECRET_ARTIFACTORY_AUTH_TOKEN: ${{ secrets.ARTIFACTORY_AUTH_TOKEN }}
          SECRET_ORG_PAT: ${{ secrets.ORG_PAT || github.token }}
        run: bash "$PIPELINE_DIR/scripts/run-docker.sh"

      - name: Upload Docker scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agentic-docker
          path: ${{ env.AGENTIC_TMP }}/
          retention-days: 1

  sonar:
    name: SonarQube results
    needs: gate
    if: needs.gate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone pipeline scripts
        env:
          PIPELINE_TOKEN: ${{ secrets.ORG_PAT || github.token }}
          PIPELINE_REPO: ${{ inputs.pipeline_repository }}
          PIPELINE_REF: ${{ inputs.pipeline_ref }}
        run: |
          rm -rf "$PIPELINE_DIR"
          git clone "https://x-access-token:${PIPELINE_TOKEN}@github.com/${PIPELINE_REPO}.git" "$PIPELINE_DIR"
          git -C "$PIPELINE_DIR" checkout "$PIPELINE_REF"

      - name: Fetch SonarQube
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT || github.token }}
        run: |
          mkdir -p "${AGENTIC_TMP}"
          bash "$PIPELINE_DIR/scripts/run-sonar.sh"

      - name: Upload SonarQube artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentic-sonar
          path: ${{ env.AGENTIC_TMP }}/
          retention-days: 1

  finalize:
    name: AI review and publish
    needs: [gate, prepare, checks, scans, docker, sonar]
    if: always() && needs.gate.outputs.skip != 'true' && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Clone pipeline scripts
        env:
          PIPELINE_TOKEN: ${{ secrets.ORG_PAT || github.token }}
          PIPELINE_REPO: ${{ inputs.pipeline_repository }}
          PIPELINE_REF: ${{ inputs.pipeline_ref }}
        run: |
          rm -rf "$PIPELINE_DIR"
          git clone "https://x-access-token:${PIPELINE_TOKEN}@github.com/${PIPELINE_REPO}.git" "$PIPELINE_DIR"
          git -C "$PIPELINE_DIR" checkout "$PIPELINE_REF"

      - name: Download prepare artifacts
        uses: actions/download-artifact@v4
        with:
          name: agentic-prepare
          path: ${{ env.AGENTIC_TMP }}

      - name: Download checks artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: agentic-checks
          path: ${{ env.AGENTIC_TMP }}

      - name: Download security artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: agentic-scans
          path: ${{ env.AGENTIC_TMP }}

      - name: Download Docker artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: agentic-docker
          path: ${{ env.AGENTIC_TMP }}

      - name: Download SonarQube artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: agentic-sonar
          path: ${{ env.AGENTIC_TMP }}

      - name: Download timer artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: agentic-timer
          path: ${{ runner.temp }}

      - name: AI Pass 2 — review and verdict
        continue-on-error: true
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
          PR_SIZE: ${{ needs.prepare.outputs.pr_size }}
          DIFF_LINES: ${{ needs.prepare.outputs.diff_lines }}
          CHANGED_FILES: ${{ needs.prepare.outputs.changed_files }}
          REVIEW_TYPE: ${{ needs.prepare.outputs.review_type }}
          CHECKS_PASSED: ${{ needs.checks.outputs.passed || '0' }}
          CHECKS_FAILED: ${{ needs.checks.outputs.failed || '0' }}
          CHECKS_EXIT: ${{ needs.checks.outputs.exit_code || '0' }}
          SETUP_FAILED: ${{ needs.checks.outputs.setup_failed || 'false' }}
          PR_SCOPE: ${{ needs.prepare.outputs.pr_scope || 'code' }}
        run: |
          TIMER_FILE="${{ runner.temp }}/timer.txt"
          [[ -f "$TIMER_FILE" ]] && export TIMER_START=$(cat "$TIMER_FILE")
          export SETUP_FAILED="${{ needs.checks.outputs.setup_failed || 'false' }}"
          bash "$PIPELINE_DIR/scripts/ai-pass2.sh"

      - name: Post review to PR
        uses: actions/github-script@v7
        env:
          AGENTIC_TMP: ${{ env.AGENTIC_TMP }}
          CHECKS_PASSED: ${{ needs.checks.outputs.passed || '0' }}
          CHECKS_FAILED: ${{ needs.checks.outputs.failed || '0' }}
          CHECKS_EXIT: ${{ needs.checks.outputs.exit_code || '0' }}
          SETUP_FAILED: ${{ needs.checks.outputs.setup_failed || 'false' }}
          PR_SCOPE: ${{ needs.prepare.outputs.pr_scope || 'code' }}
          PIPELINE_DIR: ${{ env.PIPELINE_DIR }}
          DOCKER_FOUND: ${{ needs.docker.outputs.docker_found || 'false' }}
          SECURITY_EXIT: ${{ needs.scans.outputs.security_exit || '0' }}
          PR_SIZE: ${{ needs.prepare.outputs.pr_size }}
          DIFF_LINES: ${{ needs.prepare.outputs.diff_lines }}
          CHANGED_FILES: ${{ needs.prepare.outputs.changed_files }}
          REVIEW_TYPE: ${{ needs.prepare.outputs.review_type }}
          TIMER_FILE: ${{ runner.temp }}/timer.txt
          RUNNER_TEMP: ${{ runner.temp }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_STARTED_AT: ${{ github.run_started_at }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          script: |
            const path = require('path');
            const modPath = path.join(process.env.PIPELINE_DIR || '/tmp/agentic-review-pipeline', 'scripts', 'post-review.js');
            const { body, reviewData, COMMENT_MARKER } = require(modPath);

            const isAiComment = (c) => {
              const login = c.user?.login || '';
              const bot = c.user?.type === 'Bot' || login === 'github-actions[bot]' || login.startsWith('github-actions');
              if (!bot || !c.body) return false;
              return c.body.includes(COMMENT_MARKER) || c.body.startsWith('## 🤖 AI Code Review');
            };

            let allComments = [];
            for (let page = 1; page <= 10; page++) {
              const { data } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
                page
              });
              allComments = allComments.concat(data);
              if (data.length < 100) break;
            }

            const aiComments = allComments.filter(isAiComment).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            const existing = aiComments[0] || null;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              for (const dup of aiComments.slice(1)) {
                try {
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: dup.id
                  });
                } catch (e) { console.log('delete duplicate comment:', e.message); }
              }
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

            const verdict = reviewData.verdict;
            try {
              const { data: existingReviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });
              for (const review of existingReviews.filter(r =>
                r.user.login === 'github-actions[bot]' &&
                (r.state === 'APPROVED' || r.state === 'CHANGES_REQUESTED'))) {
                try {
                  await github.rest.pulls.dismissReview({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    review_id: review.id,
                    message: 'Superseded by new AI review run'
                  });
                } catch (e) { console.log('dismiss:', e.message); }
              }
            } catch (e) { console.log('list reviews:', e.message); }

            // PR review event only records verdict on the timeline — full text lives in the issue comment above.
            const reviewNote = '_See the **🤖 AI Code Review** comment (updated each run) for details._';
            if (verdict === 'approve') {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'APPROVE',
                body: reviewNote
              }).catch(e => console.log('approve:', e.message));
            } else if (verdict === 'reject' || verdict === 'needs_work') {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'REQUEST_CHANGES',
                body: reviewNote
              }).catch(e => console.log('request changes:', e.message));
            }

            // PR list labels (like dependabot labels) — visible before opening the PR
            const AI_LABELS = ['ai-approved', 'ai-rejected', 'ai-needs-work', 'ai-review-suggestions'];
            const labelDefs = {
              'ai-approved': { color: '1a7f37', description: 'AI PR review: approved (no blocking issues in diff)' },
              'ai-rejected': { color: 'b60205', description: 'AI PR review: changes required (blocking issues)' },
              'ai-review-suggestions': { color: 'd1242f', description: 'AI PR review: suggested fixes in your changed files (non-blocking)' }
            };
            for (const [name, meta] of Object.entries(labelDefs)) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color: meta.color,
                    description: meta.description
                  });
                }
              }
            }
            let targetLabel = null;
            if (verdict === 'approve') targetLabel = 'ai-approved';
            else if (verdict === 'reject') targetLabel = 'ai-rejected';
            else if (verdict === 'needs_work') targetLabel = 'ai-review-suggestions';

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const current = (issue.labels || []).map(l => l.name);
            for (const name of AI_LABELS) {
              if (current.includes(name) && name !== targetLabel) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name
                }).catch(e => console.log('remove label:', e.message));
              }
            }
            if (targetLabel) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [targetLabel]
              }).catch(e => console.log('add label:', e.message));
              core.info(`PR label set: ${targetLabel} (verdict=${verdict})`);
            } else {
              core.info(`PR labels cleared (verdict=${verdict || 'comment'})`);
            }

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-debug-${{ github.run_id }}
          path: ${{ env.AGENTIC_TMP }}/
          retention-days: 7

      - name: Step summary
        if: always()
        run: |
          echo "## AI Code Review Dashboard" >> "$GITHUB_STEP_SUMMARY"
          echo "Mode: ${{ needs.prepare.outputs.review_type }}" >> "$GITHUB_STEP_SUMMARY"
          echo "PR: ${{ needs.prepare.outputs.diff_lines }} lines" >> "$GITHUB_STEP_SUMMARY"
