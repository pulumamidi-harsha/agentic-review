name: AI PR Review

on:
  workflow_call:
    inputs:
      review_type:
        description: 'Type of review: full, security, quick'
        required: false
        type: string
        default: 'full'
    secrets:
      AI_API_KEY:
        description: 'API key for LLM (MGA/OpenAI/Azure OpenAI)'
        required: true
      AI_API_ENDPOINT:
        description: 'LLM API endpoint URL'
        required: true
      ORG_PAT:
        description: 'Org-level PAT with repo read access'
        required: true
      ARTIFACTORY_USERNAME:
        description: 'Bayer Artifactory username (for private npm packages)'
        required: false
      ARTIFACTORY_AUTH_TOKEN:
        description: 'Bayer Artifactory auth token (for private npm packages)'
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: ai-review-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
      - name: Check for skip label
        id: skip_check
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request?.labels?.map(l => l.name) || [];
            const skip = labels.includes('skip-ai-review') || labels.includes('no-review');
            if (skip) {
              core.info('Skipping AI review — PR has skip label');
            }
            core.setOutput('skip', skip.toString());

      - name: Start timer
        if: steps.skip_check.outputs.skip != 'true'
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout caller repo
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load repo config (.agentic-review.yml)
        if: steps.skip_check.outputs.skip != 'true'
        id: config
        run: |
          # Load optional per-repo configuration
          if [[ -f ".agentic-review.yml" ]]; then
            echo "  Found .agentic-review.yml — loading config"
            echo "has_config=true" >> "$GITHUB_OUTPUT"
            # Extract settings (simple key: value parsing)
            SKIP_DOCKER=$(grep -E "^skip_docker:" .agentic-review.yml 2>/dev/null | awk '{print $2}' || echo "false")
            SKIP_SECURITY=$(grep -E "^skip_security:" .agentic-review.yml 2>/dev/null | awk '{print $2}' || echo "false")
            SKIP_CHECKS=$(grep -E "^skip_checks:" .agentic-review.yml 2>/dev/null | awk '{print $2}' || echo "false")
            MAX_DIFF_LINES=$(grep -E "^max_diff_lines:" .agentic-review.yml 2>/dev/null | awk '{print $2}' || echo "15000")
            echo "skip_docker=${SKIP_DOCKER}" >> "$GITHUB_OUTPUT"
            echo "skip_security=${SKIP_SECURITY}" >> "$GITHUB_OUTPUT"
            echo "skip_checks=${SKIP_CHECKS}" >> "$GITHUB_OUTPUT"
            echo "max_diff_lines=${MAX_DIFF_LINES}" >> "$GITHUB_OUTPUT"
          else
            echo "  No .agentic-review.yml found — using defaults"
            echo "has_config=false" >> "$GITHUB_OUTPUT"
            echo "skip_docker=false" >> "$GITHUB_OUTPUT"
            echo "skip_security=false" >> "$GITHUB_OUTPUT"
            echo "skip_checks=false" >> "$GITHUB_OUTPUT"
            echo "max_diff_lines=15000" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather repository context
        if: steps.skip_check.outputs.skip != 'true'
        id: context
        run: |
          echo ""
          echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
          echo "┃          STAGE 1: Repository Context Gathering        ┃"
          echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
          echo ""
          find . -type f \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './dist/*' \
            -not -path './build/*' \
            -not -path './.next/*' \
            -not -path './__pycache__/*' \
            -not -path './.venv/*' \
            -not -path './vendor/*' \
            -not -path './target/*' \
            -not -path './.gradle/*' \
            | sort | head -500 > /tmp/file-tree.txt
          FILE_COUNT=$(wc -l < /tmp/file-tree.txt)
          echo "  Found ${FILE_COUNT} files in repository"

          git diff origin/${{ github.base_ref }}...HEAD -- . \
            ':!package-lock.json' ':!yarn.lock' ':!pnpm-lock.yaml' ':!*.lock' ':!go.sum' ':!Cargo.lock' \
            > /tmp/pr-diff.txt 2>/dev/null || true
          DIFF_LINES=$(wc -l < /tmp/pr-diff.txt)
          CHANGED_FILES=$(grep -c "^diff --git" /tmp/pr-diff.txt 2>/dev/null || echo "0")
          echo "  PR diff: ${DIFF_LINES} lines across ${CHANGED_FILES} files"

          CONFIG_CONTENT=""
          CONFIG_COUNT=0
          for f in $(find . -maxdepth 3 \( \
            -name "package.json" -o -name "tsconfig.json" -o -name "pnpm-workspace.yaml" \
            -o -name "pyproject.toml" -o -name "requirements*.txt" -o -name "setup.py" \
            -o -name "go.mod" -o -name "Cargo.toml" -o -name "Cargo.lock" \
            -o -name "pom.xml" -o -name "build.gradle" -o -name "build.gradle.kts" \
            -o -name "Gemfile" -o -name "Rakefile" -o -name ".rubocop.yml" \
            -o -name "mix.exs" -o -name "composer.json" -o -name "phpstan.neon" \
            -o -name "*.csproj" -o -name "*.sln" \
            -o -name "Makefile" -o -name "Dockerfile" \
            -o -name "eslint.config*" -o -name ".eslintrc*" \
            -o -name "vitest.config*" -o -name "jest.config*" -o -name "pytest.ini" \
            -o -name "nx.json" -o -name "turbo.json" \
            -o -name ".npmrc" -o -name ".yarnrc.yml" \
            -o -name "*.tf" -o -name "Chart.yaml" \
            \) -not -path './.git/*' -not -path './node_modules/*' -not -path './vendor/*' 2>/dev/null | sort | head -25); do
            if [[ -f "$f" ]] && [[ $(wc -c < "$f") -lt 50000 ]]; then
              CONFIG_CONTENT+=$'\n=== FILE: '"$f"$' ===\n'
              CONFIG_CONTENT+="$(cat "$f")"$'\n'
              CONFIG_COUNT=$((CONFIG_COUNT + 1))
            fi
          done
          echo "$CONFIG_CONTENT" > /tmp/config-files.txt
          echo "  Config files found: ${CONFIG_COUNT}"

          # PR size analysis
          echo "diff_lines=${DIFF_LINES}" >> "$GITHUB_OUTPUT"
          echo "changed_files=${CHANGED_FILES}" >> "$GITHUB_OUTPUT"

          PR_SIZE="normal"
          if [[ $DIFF_LINES -gt 2000 ]]; then PR_SIZE="large"; fi
          if [[ $DIFF_LINES -gt 5000 ]]; then PR_SIZE="very_large"; fi
          echo "pr_size=${PR_SIZE}" >> "$GITHUB_OUTPUT"

          if [[ "$PR_SIZE" == "very_large" ]]; then
            echo "  ⚠ PR is very large (${DIFF_LINES} lines). AI review quality may be reduced."
            echo "  Consider splitting into smaller PRs for better reviews."
          fi
          echo ""

      - name: "AI Pass 1: Detect stack & generate commands"
        if: steps.skip_check.outputs.skip != 'true'
        id: pass1
        continue-on-error: true
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
        run: |
          set +e
          echo ""
          echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
          echo "┃          STAGE 2: AI Stack Detection                  ┃"
          echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
          echo ""

          # Validate secrets are available
          if [[ -z "$AI_API_ENDPOINT" || -z "$AI_API_KEY" ]]; then
            echo "::error::AI_API_ENDPOINT or AI_API_KEY secret is not configured."
            echo "::error::Please add these secrets to your repository Settings > Secrets > Actions"
            echo '{"stack":{"language":"unknown"},"setup_commands":[],"check_commands":[],"runtime_requirements":{}}' > /tmp/ai-commands.json
            echo "node_version=" >> "$GITHUB_OUTPUT"
            echo "python_version=" >> "$GITHUB_OUTPUT"
            echo "go_version=" >> "$GITHUB_OUTPUT"
            echo "ruby_version=" >> "$GITHUB_OUTPUT"
            echo "java_version=" >> "$GITHUB_OUTPUT"
            echo "dotnet_version=" >> "$GITHUB_OUTPUT"
            echo "php_version=" >> "$GITHUB_OUTPUT"
            echo "elixir_version=" >> "$GITHUB_OUTPUT"
            echo "terraform_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SYSTEM_PROMPT='You are a senior DevOps engineer analyzing a repository to determine its tech stack and what CI commands to run.

          SUPPORTED STACKS: Node.js, TypeScript, Python, Go, Rust, Java, Kotlin, Ruby, Elixir, PHP, C#/.NET, Scala, Swift, Terraform, Helm, CloudFormation, Ansible.

          MONOREPO / MULTI-STACK HANDLING:
          - A repository may contain MULTIPLE stacks (e.g., frontend + backend + infrastructure).
          - Detect ALL stacks present. List them in "stacks" array.
          - Generate setup and check commands for EACH stack with proper directory context (cd into subdirectory first).
          - Example: a repo with frontend/ (React) + backend/ (Python) + infra/ (Terraform) should generate:
            setup: ["cd frontend && npm install", "cd backend && pip install -r requirements.txt"]
            checks: ["cd frontend && npm run lint", "cd frontend && npm run test", "cd backend && ruff check .", "cd backend && pytest", "cd infra && terraform fmt -check", "cd infra && terraform validate"]
          - Set ALL runtime versions needed (node_version AND python_version AND terraform_version etc.)

          INFRASTRUCTURE-AS-CODE (IaC) CHECKS:
          - Terraform: terraform fmt -check, terraform init -backend=false && terraform validate, tflint (if .tflint.hcl exists), checkov -d . (if checkov config exists)
          - Helm: helm lint ., helm template . (for syntax verification)
          - CloudFormation: cfn-lint **/*.yaml (if templates/ or cfn/ dirs exist)
          - Ansible: ansible-lint (if ansible.cfg or playbooks/ exist)
          - Kubernetes manifests: kubeval or kubeconform (if k8s/ or manifests/ dirs exist)
          - For Terraform repos, always run fmt + validate. If modules/ dir exists, validate each module.

          RULES:
          1) ONLY derive commands from what you see in the repository config files.
          2) DO NOT invent commands the repo does not support.
          3) For setup_commands: include dependency installation for ALL stacks. Use `cd <dir> &&` prefix for subdirectories.
          4) For check_commands: include linting, type checking, formatting, unit tests, build verification for ALL stacks.
          5) Do NOT include e2e tests, deployment commands, or docker builds.
          6) Stack-specific guidance:
             - Node/TS: read package.json scripts, packageManager field, .npmrc
             - Python: read pyproject.toml [tool.*], Makefile targets, requirements*.txt
             - Go: read go.mod, look for golangci-lint
             - Rust: read Cargo.toml, use cargo check/clippy/test
             - Ruby: read Gemfile, Rakefile, .rubocop.yml → bundle exec rake, rubocop
             - Elixir: read mix.exs → mix format --check-formatted, mix credo, mix test
             - PHP: read composer.json → phpstan, phpunit, php-cs-fixer
             - Java/Kotlin: read pom.xml or build.gradle → mvn verify or gradle check
             - C#/.NET: read *.csproj, *.sln → dotnet build, dotnet test
             - Terraform: read *.tf → terraform fmt -check, terraform init -backend=false && terraform validate, tflint
             - Helm: read Chart.yaml → helm lint, helm template
             - Ansible: read ansible.cfg → ansible-lint
             - Kubernetes: kubeval/kubeconform for manifest files

          Return ONLY valid JSON (no markdown fences):
          {"stack":{"language":"...","framework":"...","package_manager":"...","package_manager_version":"...","runtime":"..."},"stacks":[{"language":"...","framework":"...","directory":"root or subdir path"}],"setup_commands":[{"cmd":"...","purpose":"..."}],"check_commands":[{"cmd":"...","purpose":"...","confidence":"high|medium|low"}],"runtime_requirements":{"node_version":null,"python_version":null,"go_version":null,"ruby_version":null,"java_version":null,"dotnet_version":null,"php_version":null,"elixir_version":null,"terraform_version":null}}'

          FILE_TREE=$(cat /tmp/file-tree.txt)
          CONFIG_FILES=$(cat /tmp/config-files.txt)

          USER_MSG="## Repository File Tree
          ${FILE_TREE:0:6000}

          ## Configuration Files
          ${CONFIG_FILES:0:40000}

          Analyze this repository. It may be a monorepo with multiple stacks in different directories. Detect ALL stacks present. Generate commands for each stack to validate code quality, run tests, check formatting, and verify builds. For infrastructure code (Terraform, Helm, Kubernetes), include IaC-specific validation checks. Use 'cd <dir> &&' prefix when commands need to run in subdirectories."

          RESPONSE=$(curl -sS -X POST "${AI_API_ENDPOINT}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AI_API_KEY}" \
            --max-time 120 \
            -d "$(jq -n \
              --arg system "$SYSTEM_PROMPT" \
              --arg user "$USER_MSG" \
              '{
                "model": "gpt-4.1",
                "messages": [
                  {"role": "system", "content": $system},
                  {"role": "user", "content": $user}
                ],
                "temperature": 0,
                "max_tokens": 2048
              }')" 2>/tmp/curl-error.txt)
          CURL_EXIT=$?

          if [[ $CURL_EXIT -ne 0 ]]; then
            echo "::warning::curl failed with exit code $CURL_EXIT"
            cat /tmp/curl-error.txt 2>/dev/null || true
            echo '{"stack":{"language":"unknown"},"setup_commands":[],"check_commands":[],"runtime_requirements":{}}' > /tmp/ai-commands.json
          else
            AI_OUTPUT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null)

            if [[ -z "$AI_OUTPUT" ]]; then
              echo "::warning::AI Pass 1 returned empty response"
              echo "  Raw response (first 500 chars): ${RESPONSE:0:500}"
              echo '{"stack":{"language":"unknown"},"setup_commands":[],"check_commands":[],"runtime_requirements":{}}' > /tmp/ai-commands.json
            else
              CLEANED=$(echo "$AI_OUTPUT" | sed 's/^```json//;s/^```//')
              echo "$CLEANED" | jq '.' > /tmp/ai-commands.json 2>/dev/null || echo "$CLEANED" > /tmp/ai-commands.json
            fi
          fi

          echo ""
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  DETECTED STACK                                      │"
          echo "└─────────────────────────────────────────────────────┘"
          jq '.stack' /tmp/ai-commands.json 2>/dev/null || true
          echo ""
          echo "  Setup commands:"
          jq -r '.setup_commands[]? | "    > \(.cmd) -- \(.purpose)"' /tmp/ai-commands.json 2>/dev/null || echo "    (none)"
          echo "  Check commands:"
          jq -r '.check_commands[]? | "    > \(.cmd) -- \(.purpose) [\(.confidence)]"' /tmp/ai-commands.json 2>/dev/null || echo "    (none)"
          echo ""

          NODE_VER=$(jq -r '.runtime_requirements.node_version // empty' /tmp/ai-commands.json 2>/dev/null)
          PYTHON_VER=$(jq -r '.runtime_requirements.python_version // empty' /tmp/ai-commands.json 2>/dev/null)
          GO_VER=$(jq -r '.runtime_requirements.go_version // empty' /tmp/ai-commands.json 2>/dev/null)
          RUBY_VER=$(jq -r '.runtime_requirements.ruby_version // empty' /tmp/ai-commands.json 2>/dev/null)
          JAVA_VER=$(jq -r '.runtime_requirements.java_version // empty' /tmp/ai-commands.json 2>/dev/null)
          DOTNET_VER=$(jq -r '.runtime_requirements.dotnet_version // empty' /tmp/ai-commands.json 2>/dev/null)
          PHP_VER=$(jq -r '.runtime_requirements.php_version // empty' /tmp/ai-commands.json 2>/dev/null)
          ELIXIR_VER=$(jq -r '.runtime_requirements.elixir_version // empty' /tmp/ai-commands.json 2>/dev/null)
          TERRAFORM_VER=$(jq -r '.runtime_requirements.terraform_version // empty' /tmp/ai-commands.json 2>/dev/null)
          echo "node_version=${NODE_VER:-}" >> "$GITHUB_OUTPUT"
          echo "python_version=${PYTHON_VER:-}" >> "$GITHUB_OUTPUT"
          echo "go_version=${GO_VER:-}" >> "$GITHUB_OUTPUT"
          echo "ruby_version=${RUBY_VER:-}" >> "$GITHUB_OUTPUT"
          echo "java_version=${JAVA_VER:-}" >> "$GITHUB_OUTPUT"
          echo "dotnet_version=${DOTNET_VER:-}" >> "$GITHUB_OUTPUT"
          echo "php_version=${PHP_VER:-}" >> "$GITHUB_OUTPUT"
          echo "elixir_version=${ELIXIR_VER:-}" >> "$GITHUB_OUTPUT"
          echo "terraform_version=${TERRAFORM_VER:-}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.pass1.outputs.node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.pass1.outputs.node_version }}

      - name: Install package manager
        if: steps.pass1.outputs.node_version != ''
        run: |
          PKG_MGR=$(jq -r '.stack.package_manager // empty' /tmp/ai-commands.json)
          PKG_MGR_VER=$(jq -r '.stack.package_manager_version // empty' /tmp/ai-commands.json)
          PKG_MGR_FIELD=$(jq -r '.packageManager // empty' package.json 2>/dev/null)
          case "$PKG_MGR" in
            pnpm)
              if [[ -n "$PKG_MGR_FIELD" && "$PKG_MGR_FIELD" == pnpm@* ]]; then
                VER="${PKG_MGR_FIELD#pnpm@}"; VER="${VER%%+*}"
              elif [[ -n "$PKG_MGR_VER" && "$PKG_MGR_VER" != "null" ]]; then
                VER="$PKG_MGR_VER"
              else
                VER="9"
              fi
              echo "Installing pnpm@${VER}..."
              npm install -g "pnpm@${VER}"
              echo "pnpm $(pnpm --version)"
              ;;
            yarn)
              if [[ -n "$PKG_MGR_FIELD" && "$PKG_MGR_FIELD" == yarn@* ]]; then
                VER="${PKG_MGR_FIELD#yarn@}"; VER="${VER%%+*}"
              else
                VER="4"
              fi
              echo "Installing yarn@${VER}..."
              corepack enable && corepack prepare "yarn@${VER}" --activate
              echo "yarn $(yarn --version)"
              ;;
            *)
              echo "Using npm $(npm --version)"
              ;;
          esac

      - name: Configure private registry (Artifactory)
        if: steps.pass1.outputs.node_version != ''
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_AUTH_TOKEN: ${{ secrets.ARTIFACTORY_AUTH_TOKEN }}
        run: |
          echo "@monsantoit:registry=https://artifactory.bayer.com/artifactory/api/npm/npm-platforms-engineering/" >> ~/.npmrc
          echo "@element:registry=https://artifactory.bayer.com/artifactory/api/npm/npm-platforms-engineering/" >> ~/.npmrc
          if [[ -n "$ARTIFACTORY_USERNAME" && -n "$ARTIFACTORY_AUTH_TOKEN" ]]; then
            echo "//artifactory.bayer.com/artifactory/api/npm/npm-platforms-engineering/:username=$ARTIFACTORY_USERNAME" >> ~/.npmrc
            echo "//artifactory.bayer.com/artifactory/api/npm/npm-platforms-engineering/:_authToken=$ARTIFACTORY_AUTH_TOKEN" >> ~/.npmrc
            echo "//artifactory.bayer.com/artifactory/api/npm/npm-platforms-engineering/:always-auth=true" >> ~/.npmrc
            echo "Artifactory auth configured"
          else
            echo "WARNING: No Artifactory credentials - private packages may fail"
          fi
          npm config set registry https://registry.npmjs.org/

      - name: Setup Python
        if: steps.pass1.outputs.python_version != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.pass1.outputs.python_version }}

      - name: Setup Go
        if: steps.pass1.outputs.go_version != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.pass1.outputs.go_version }}

      - name: Setup Ruby
        if: steps.pass1.outputs.ruby_version != ''
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.pass1.outputs.ruby_version }}
          bundler-cache: true

      - name: Setup Java
        if: steps.pass1.outputs.java_version != ''
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ steps.pass1.outputs.java_version }}

      - name: Setup .NET
        if: steps.pass1.outputs.dotnet_version != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.pass1.outputs.dotnet_version }}

      - name: Setup PHP
        if: steps.pass1.outputs.php_version != ''
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ steps.pass1.outputs.php_version }}
          tools: composer

      - name: Setup Elixir
        if: steps.pass1.outputs.elixir_version != ''
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ steps.pass1.outputs.elixir_version }}
          otp-version: '26'

      - name: Setup Terraform
        if: steps.pass1.outputs.terraform_version != ''
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.pass1.outputs.terraform_version }}

      - name: Run AI-determined checks
        if: steps.skip_check.outputs.skip != 'true' && steps.config.outputs.skip_checks != 'true'
        id: checks
        continue-on-error: true
        run: |
          set +e
          echo ""
          echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
          echo "┃          STAGE 3: Running Code Quality Checks         ┃"
          echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
          echo ""

          # Ensure ai-commands.json exists
          if [[ ! -f /tmp/ai-commands.json ]]; then
            echo "::warning::No AI commands file found — skipping checks"
            echo "" > /tmp/check-results.txt
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "passed=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "setup_failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RESULTS=""
          OVERALL_EXIT=0
          PASSED_COUNT=0
          FAILED_COUNT=0
          SETUP_FAILED=false

          echo "--- SETUP: Installing dependencies ---"
          SETUP_CMDS=$(jq -r '.setup_commands[]?.cmd // empty' /tmp/ai-commands.json)
          while IFS= read -r cmd; do
            [[ -z "$cmd" ]] && continue
            echo ""
            echo "  > $cmd"
            if eval "$cmd" 2>&1; then
              echo "  OK: Setup command succeeded"
            else
              echo "  FAIL: Setup command failed (exit $?)"
              SETUP_FAILED=true
            fi
          done <<< "$SETUP_CMDS"
          echo ""

          CHECK_COUNT=$(jq '.check_commands | length' /tmp/ai-commands.json)
          echo "--- CHECKS: Running ${CHECK_COUNT} commands ---"

          for i in $(seq 0 $((CHECK_COUNT - 1))); do
            CMD=$(jq -r ".check_commands[$i].cmd" /tmp/ai-commands.json)
            PURPOSE=$(jq -r ".check_commands[$i].purpose" /tmp/ai-commands.json)
            CONFIDENCE=$(jq -r ".check_commands[$i].confidence" /tmp/ai-commands.json)
            [[ -z "$CMD" || "$CMD" == "null" ]] && continue

            echo ""
            echo "  [$((i+1))/${CHECK_COUNT}] ${PURPOSE} [${CONFIDENCE}]"
            echo "  > ${CMD}"

            CMD_OUTPUT=$(eval "$CMD" 2>&1) && CMD_EXIT=0 || CMD_EXIT=$?

            if [[ $CMD_EXIT -ne 0 ]]; then
              OVERALL_EXIT=1
              FAILED_COUNT=$((FAILED_COUNT + 1))
              STATUS="FAILED (exit $CMD_EXIT)"
              echo "  RESULT: ${STATUS}"
              echo "$CMD_OUTPUT" | head -30
            else
              PASSED_COUNT=$((PASSED_COUNT + 1))
              STATUS="PASSED"
              echo "  RESULT: ${STATUS}"
              echo "$CMD_OUTPUT" | tail -5
            fi

            RESULTS+="### ${PURPOSE} -- ${STATUS}"$'\n'
            RESULTS+='```'$'\n'
            RESULTS+='$ '"${CMD}"$'\n'
            RESULTS+="${CMD_OUTPUT:0:4000}"$'\n'
            RESULTS+='```'$'\n\n'
          done

          echo ""
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  CHECKS COMPLETE: ${PASSED_COUNT} passed, ${FAILED_COUNT} failed        │"
          echo "└─────────────────────────────────────────────────────┘"
          if [[ "$SETUP_FAILED" == "true" ]]; then
            echo "⚠ WARNING: Some checks may have failed due to dependency installation failure"
          fi

          {
            echo "**Summary:** ${PASSED_COUNT} passed, ${FAILED_COUNT} failed"
            if [[ "$SETUP_FAILED" == "true" ]]; then
              echo ""
              echo "> WARNING: Dependency installation failed. Failures below may be due to missing packages, not actual code issues."
              echo ""
            fi
            echo ""
            echo "$RESULTS"
          } > /tmp/check-results.txt

          echo "exit_code=$OVERALL_EXIT" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED_COUNT" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED_COUNT" >> "$GITHUB_OUTPUT"
          echo "setup_failed=$SETUP_FAILED" >> "$GITHUB_OUTPUT"

      - name: "Docker Build & Trivy Security Scan"
        if: steps.skip_check.outputs.skip != 'true' && steps.config.outputs.skip_docker != 'true'
        id: docker
        continue-on-error: true
        run: |
          set +e
          echo ""
          echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
          echo "┃          STAGE 4: Docker Build & Trivy Scan           ┃"
          echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
          echo ""

          # Auto-detect Dockerfiles in the repo
          DOCKERFILES=$(find . -maxdepth 3 \( -name "Dockerfile" -o -name "Dockerfile.*" -o -name "*.Dockerfile" \) \
            -not -path './.git/*' -not -path './node_modules/*' -not -path './.venv/*' 2>/dev/null)

          if [[ -z "$DOCKERFILES" ]]; then
            echo "  No Dockerfile found — skipping Docker build & scan"
            echo "docker_found=false" >> "$GITHUB_OUTPUT"
            echo "" > /tmp/docker-results.txt
            exit 0
          fi

          echo "docker_found=true" >> "$GITHUB_OUTPUT"
          DOCKER_RESULTS=""
          DOCKER_EXIT=0

          # Install Trivy for container scanning
          echo "--- Installing Trivy scanner ---"
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin 2>&1 || {
            echo "::warning::Failed to install Trivy — skipping security scan"
            TRIVY_AVAILABLE=false
          }
          TRIVY_AVAILABLE=${TRIVY_AVAILABLE:-true}

          while IFS= read -r dockerfile; do
            [[ -z "$dockerfile" ]] && continue
            echo ""
            echo "  === Building: ${dockerfile} ==="

            # Determine build context (directory containing the Dockerfile)
            BUILD_CONTEXT=$(dirname "$dockerfile")
            IMAGE_TAG="agentic-review-scan:$(echo "$dockerfile" | md5sum | cut -c1-8)"

            # Check if Dockerfile uses ARG/ENV that need build args
            BUILD_ARGS=""
            REQUIRED_ARGS=$(grep -E "^ARG " "$dockerfile" 2>/dev/null | grep -v "=" | awk '{print $2}' | cut -d'=' -f1)
            if [[ -n "$REQUIRED_ARGS" ]]; then
              echo "  Detected required build args (providing dummy values for build verification):"
              while IFS= read -r arg; do
                [[ -z "$arg" ]] && continue
                echo "    --build-arg ${arg}=placeholder"
                BUILD_ARGS+=" --build-arg ${arg}=placeholder"
              done <<< "$REQUIRED_ARGS"
            fi

            # Run Docker build
            echo "  > docker build -t ${IMAGE_TAG} -f ${dockerfile} ${BUILD_ARGS} ${BUILD_CONTEXT}"
            BUILD_OUTPUT=$(docker build -t "${IMAGE_TAG}" -f "${dockerfile}" ${BUILD_ARGS} "${BUILD_CONTEXT}" 2>&1)
            BUILD_EXIT=$?

            if [[ $BUILD_EXIT -ne 0 ]]; then
              DOCKER_EXIT=1
              echo "  RESULT: BUILD FAILED (exit ${BUILD_EXIT})"
              DOCKER_RESULTS+="### Docker Build: ${dockerfile} -- FAILED (exit ${BUILD_EXIT})"$'\n'
              DOCKER_RESULTS+='```'$'\n'
              DOCKER_RESULTS+="${BUILD_OUTPUT:(-3000)}"$'\n'
              DOCKER_RESULTS+='```'$'\n\n'
            else
              echo "  RESULT: BUILD PASSED"
              DOCKER_RESULTS+="### Docker Build: ${dockerfile} -- PASSED"$'\n\n'

              # Run Trivy vulnerability scan on the built image
              if [[ "$TRIVY_AVAILABLE" == "true" ]]; then
                echo "  --- Running Trivy security scan on ${IMAGE_TAG} ---"
                TRIVY_OUTPUT=$(trivy image --severity HIGH,CRITICAL --no-progress --exit-code 1 "${IMAGE_TAG}" 2>&1)
                TRIVY_EXIT=$?

                if [[ $TRIVY_EXIT -ne 0 ]]; then
                  echo "  RESULT: TRIVY FOUND VULNERABILITIES"
                  DOCKER_RESULTS+="### Trivy Scan: ${dockerfile} -- VULNERABILITIES FOUND"$'\n'
                  DOCKER_RESULTS+='```'$'\n'
                  DOCKER_RESULTS+="${TRIVY_OUTPUT:0:4000}"$'\n'
                  DOCKER_RESULTS+='```'$'\n\n'
                else
                  echo "  RESULT: TRIVY PASSED (no HIGH/CRITICAL vulnerabilities)"
                  DOCKER_RESULTS+="### Trivy Scan: ${dockerfile} -- PASSED (no HIGH/CRITICAL)"$'\n\n'
                fi
              fi
            fi

            # Clean up image
            docker rmi "${IMAGE_TAG}" 2>/dev/null || true

          done <<< "$DOCKERFILES"

          echo ""
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  DOCKER RESULTS: build exit=$DOCKER_EXIT             │"
          echo "└─────────────────────────────────────────────────────┘"

          echo "$DOCKER_RESULTS" > /tmp/docker-results.txt
          echo "docker_exit=$DOCKER_EXIT" >> "$GITHUB_OUTPUT"

      - name: "Security Scans (Gitleaks, File Hygiene, Sensitive Data)"
        if: steps.skip_check.outputs.skip != 'true' && steps.config.outputs.skip_security != 'true'
        id: security
        continue-on-error: true
        run: |
          set +e

          echo ""
          echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
          echo "┃          SECURITY & FILE HYGIENE SCANS                ┃"
          echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
          echo ""

          SECURITY_RESULTS=""
          SECURITY_EXIT=0

          # ─────────────────────────────────────────────────────────
          # SCAN 1: Gitleaks — Detect hardcoded secrets in code
          # ─────────────────────────────────────────────────────────
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  SCAN 1: Gitleaks — Secret Detection                 │"
          echo "└─────────────────────────────────────────────────────┘"

          # Install gitleaks
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks 2>/dev/null || {
            echo "  ⚠ Failed to install gitleaks — skipping"
            SECURITY_RESULTS+="### Gitleaks (Secret Detection) -- SKIPPED (install failed)"$'\n\n'
            GITLEAKS_INSTALLED=false
          }
          GITLEAKS_INSTALLED=${GITLEAKS_INSTALLED:-true}

          if [[ "$GITLEAKS_INSTALLED" == "true" ]]; then
            # Create a config to reduce false positives (GitHub Actions refs, test fixtures, etc.)
            cat > /tmp/.gitleaks.toml << 'GITLEAKS_CFG'
          [allowlist]
            description = "Allowlist for CI pipeline - reduces false positives"
            paths = [
              '''\.github/workflows/.*\.yml$''',
              '''\.github/workflows/.*\.yaml$''',
              '''\.gitleaks\.toml$''',
              '''go\.sum$''',
              '''package-lock\.json$''',
              '''pnpm-lock\.yaml$''',
              '''yarn\.lock$''',
              '''poetry\.lock$'''
            ]
            regexTarget = "match"
            regexes = [
              '''\$\{\{\s*secrets\..*\}\}''',
              '''REDACTED''',
              '''placeholder'''
            ]
          GITLEAKS_CFG

            echo "  Scanning PR changes for hardcoded secrets (excludes workflow files, lock files)..."

            # Scan only the PR diff to focus on NEW secrets introduced by this PR
            GITLEAKS_OUTPUT=$(gitleaks detect \
              --source . \
              --no-git \
              --no-banner \
              --redact \
              --config /tmp/.gitleaks.toml \
              2>&1)
            GITLEAKS_EXIT=$?

            if [[ $GITLEAKS_EXIT -ne 0 ]]; then
              # Count actual findings (filter noise)
              FINDING_COUNT=$(echo "$GITLEAKS_OUTPUT" | grep -c "Finding:" 2>/dev/null || echo "0")

              if [[ "$FINDING_COUNT" -gt 0 ]]; then
                SECURITY_EXIT=1
                echo "  ❌ ${FINDING_COUNT} potential secret(s) detected — Review required!"
                echo "$GITLEAKS_OUTPUT"
                SECURITY_RESULTS+="### Gitleaks (Secret Detection) -- ❌ ${FINDING_COUNT} potential secret(s) found"$'\n'
                SECURITY_RESULTS+='```'$'\n'
                SECURITY_RESULTS+="${GITLEAKS_OUTPUT:0:3000}"$'\n'
                SECURITY_RESULTS+='```'$'\n'
                SECURITY_RESULTS+="Note: Review these findings. Some may be false positives (test fixtures, example configs). Add a \`.gitleaks.toml\` to your repo to customize."$'\n\n'
              else
                echo "  ✅ No actionable secrets found (some patterns excluded by config)"
                SECURITY_RESULTS+="### Gitleaks (Secret Detection) -- ✅ PASSED (no actionable findings)"$'\n\n'
              fi
            else
              echo "  ✅ No hardcoded secrets found"
              SECURITY_RESULTS+="### Gitleaks (Secret Detection) -- ✅ PASSED"$'\n\n'
            fi
          fi

          echo ""

          # ─────────────────────────────────────────────────────────
          # SCAN 2: Sensitive File Detection
          # ─────────────────────────────────────────────────────────
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  SCAN 2: Sensitive File Detection                     │"
          echo "└─────────────────────────────────────────────────────┘"

          echo "  Checking for sensitive files that should not be committed..."
          SENSITIVE_FILES=""
          SENSITIVE_PATTERNS=(
            ".env"
            ".env.local"
            ".env.production"
            "*.pem"
            "*.key"
            "*.p12"
            "*.pfx"
            "*.jks"
            "id_rsa"
            "id_ed25519"
            "*.keystore"
            "credentials.json"
            "service-account*.json"
            "secrets.yml"
            "secrets.yaml"
            ".htpasswd"
            "shadow"
          )

          for pattern in "${SENSITIVE_PATTERNS[@]}"; do
            FOUND=$(find . -name "$pattern" \
              -not -path './.git/*' \
              -not -path './node_modules/*' \
              -not -path './.venv/*' \
              -not -path './vendor/*' \
              2>/dev/null)
            if [[ -n "$FOUND" ]]; then
              SENSITIVE_FILES+="$FOUND"$'\n'
            fi
          done

          if [[ -n "$SENSITIVE_FILES" ]]; then
            SECURITY_EXIT=1
            echo "  ❌ Sensitive files found:"
            echo "$SENSITIVE_FILES" | sed 's/^/    /'
            SECURITY_RESULTS+="### Sensitive File Detection -- ❌ FOUND"$'\n'
            SECURITY_RESULTS+='```'$'\n'
            SECURITY_RESULTS+="$SENSITIVE_FILES"$'\n'
            SECURITY_RESULTS+='```'$'\n'
            SECURITY_RESULTS+="These files may contain secrets and should be in .gitignore."$'\n\n'
          else
            echo "  ✅ No sensitive files found"
            SECURITY_RESULTS+="### Sensitive File Detection -- ✅ PASSED"$'\n\n'
          fi

          echo ""

          # ─────────────────────────────────────────────────────────
          # SCAN 3: End-of-File Newline Check
          # ─────────────────────────────────────────────────────────
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  SCAN 3: End-of-File (EOF) Newline Check             │"
          echo "└─────────────────────────────────────────────────────┘"

          echo "  Checking source files for missing trailing newline..."
          EOF_ISSUES=""
          EOF_COUNT=0

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            # Only check text/source files, skip binaries
            if file "$file" 2>/dev/null | grep -q "text"; then
              if [[ -s "$file" ]] && [[ $(tail -c 1 "$file" | wc -l) -eq 0 ]]; then
                EOF_ISSUES+="  $file"$'\n'
                EOF_COUNT=$((EOF_COUNT + 1))
              fi
            fi
          done < <(find . -type f \
            \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \
            -o -name "*.py" -o -name "*.go" -o -name "*.rs" -o -name "*.rb" \
            -o -name "*.java" -o -name "*.kt" -o -name "*.scala" \
            -o -name "*.ex" -o -name "*.exs" -o -name "*.php" \
            -o -name "*.css" -o -name "*.scss" -o -name "*.html" \
            -o -name "*.yml" -o -name "*.yaml" -o -name "*.json" \
            -o -name "*.toml" -o -name "*.cfg" -o -name "*.ini" \
            -o -name "*.md" -o -name "*.tf" -o -name "*.sh" \
            -o -name "Dockerfile" -o -name "Makefile" \) \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './dist/*' \
            -not -path './.venv/*' \
            -not -path './vendor/*' \
            -not -path './build/*' \
            2>/dev/null | head -200)

          if [[ $EOF_COUNT -gt 0 ]]; then
            echo "  ⚠ ${EOF_COUNT} files missing trailing newline:"
            echo "$EOF_ISSUES" | head -20
            [[ $EOF_COUNT -gt 20 ]] && echo "  ... and $((EOF_COUNT - 20)) more"
            SECURITY_RESULTS+="### EOF Newline Check -- ⚠ ${EOF_COUNT} files missing newline"$'\n'
            SECURITY_RESULTS+='```'$'\n'
            SECURITY_RESULTS+="${EOF_ISSUES:0:2000}"$'\n'
            SECURITY_RESULTS+='```'$'\n\n'
          else
            echo "  ✅ All source files have proper trailing newline"
            SECURITY_RESULTS+="### EOF Newline Check -- ✅ PASSED"$'\n\n'
          fi

          echo ""

          # ─────────────────────────────────────────────────────────
          # SCAN 4: Large File Detection
          # ─────────────────────────────────────────────────────────
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  SCAN 4: Large File Detection (>5MB)                 │"
          echo "└─────────────────────────────────────────────────────┘"

          echo "  Scanning for files larger than 5MB..."
          LARGE_FILES=$(find . -type f -size +5M \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './.venv/*' \
            -not -path './vendor/*' \
            2>/dev/null | while read -r f; do
              SIZE=$(du -h "$f" 2>/dev/null | cut -f1)
              echo "  ${SIZE}  ${f}"
            done)

          if [[ -n "$LARGE_FILES" ]]; then
            echo "  ⚠ Large files found:"
            echo "$LARGE_FILES"
            SECURITY_RESULTS+="### Large File Detection (>5MB) -- ⚠ FOUND"$'\n'
            SECURITY_RESULTS+='```'$'\n'
            SECURITY_RESULTS+="$LARGE_FILES"$'\n'
            SECURITY_RESULTS+='```'$'\n'
            SECURITY_RESULTS+="Consider using Git LFS for large files."$'\n\n'
          else
            echo "  ✅ No files exceeding 5MB"
            SECURITY_RESULTS+="### Large File Detection (>5MB) -- ✅ PASSED"$'\n\n'
          fi

          echo ""

          # ─────────────────────────────────────────────────────────
          # SCAN 5: TODO/FIXME/HACK Detection in Changed Files
          # ─────────────────────────────────────────────────────────
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  SCAN 5: TODO/FIXME/HACK in PR Changes               │"
          echo "└─────────────────────────────────────────────────────┘"

          echo "  Checking PR diff for TODO/FIXME/HACK markers..."
          MARKERS=$(grep -n "TODO\|FIXME\|HACK\|XXX\|WORKAROUND" /tmp/pr-diff.txt 2>/dev/null | grep "^+" | head -20)

          if [[ -n "$MARKERS" ]]; then
            MARKER_COUNT=$(echo "$MARKERS" | wc -l)
            echo "  ⚠ Found ${MARKER_COUNT} TODO/FIXME markers in changes:"
            echo "$MARKERS" | sed 's/^/    /'
            SECURITY_RESULTS+="### TODO/FIXME/HACK Detection -- ⚠ ${MARKER_COUNT} markers found"$'\n'
            SECURITY_RESULTS+='```'$'\n'
            SECURITY_RESULTS+="${MARKERS:0:2000}"$'\n'
            SECURITY_RESULTS+='```'$'\n\n'
          else
            echo "  ✅ No TODO/FIXME/HACK markers in changes"
            SECURITY_RESULTS+="### TODO/FIXME/HACK Detection -- ✅ CLEAN"$'\n\n'
          fi

          echo ""

          # ─────────────────────────────────────────────────────────
          # SCAN 6: License File Check
          # ─────────────────────────────────────────────────────────
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  SCAN 6: License File Check                          │"
          echo "└─────────────────────────────────────────────────────┘"

          LICENSE_FILE=$(find . -maxdepth 1 \( -iname "LICENSE" -o -iname "LICENSE.*" -o -iname "LICENCE" -o -iname "COPYING" \) 2>/dev/null | head -1)
          if [[ -n "$LICENSE_FILE" ]]; then
            echo "  ✅ License file found: ${LICENSE_FILE}"
            SECURITY_RESULTS+="### License File -- ✅ Present (${LICENSE_FILE})"$'\n\n'
          else
            echo "  ⚠ No license file found in repo root"
            SECURITY_RESULTS+="### License File -- ⚠ Missing"$'\n'
            SECURITY_RESULTS+="Consider adding a LICENSE file to the repository root."$'\n\n'
          fi

          echo ""

          # ─────────────────────────────────────────────────────────
          # SCAN 7: YAML/JSON/XML Syntax Validation
          # ─────────────────────────────────────────────────────────
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  SCAN 7: YAML/JSON/XML Syntax Validation             │"
          echo "└─────────────────────────────────────────────────────┘"

          SYNTAX_ERRORS=""
          SYNTAX_COUNT=0

          # Get list of changed files from the PR diff
          CHANGED_FILES=$(grep "^diff --git" /tmp/pr-diff.txt 2>/dev/null | sed 's|diff --git a/||;s| b/.*||' || true)

          # Validate YAML files
          YAML_FILES=$(echo "$CHANGED_FILES" | grep -E '\.(yml|yaml)$' || true)
          if [[ -n "$YAML_FILES" ]]; then
            echo "  Checking YAML files..."
            while IFS= read -r yf; do
              [[ -z "$yf" ]] && continue
              [[ ! -f "$yf" ]] && continue
              ERR=$(python3 -c "
          import yaml, sys
          try:
              with open('$yf') as f:
                  yaml.safe_load(f)
          except yaml.YAMLError as e:
              print(str(e)[:200])
              sys.exit(1)
          " 2>&1)
              if [[ $? -ne 0 ]]; then
                echo "    ❌ $yf — INVALID YAML"
                SYNTAX_ERRORS+="- \`$yf\` — INVALID YAML: ${ERR}"$'\n'
                SYNTAX_COUNT=$((SYNTAX_COUNT + 1))
                SECURITY_EXIT=1
              else
                echo "    ✅ $yf — valid"
              fi
            done <<< "$YAML_FILES"
          fi

          # Validate JSON files
          JSON_FILES=$(echo "$CHANGED_FILES" | grep -E '\.json$' || true)
          if [[ -n "$JSON_FILES" ]]; then
            echo "  Checking JSON files..."
            while IFS= read -r jf; do
              [[ -z "$jf" ]] && continue
              [[ ! -f "$jf" ]] && continue
              ERR=$(python3 -c "
          import json, sys
          try:
              with open('$jf') as f:
                  json.load(f)
          except (json.JSONDecodeError, ValueError) as e:
              print(str(e)[:200])
              sys.exit(1)
          " 2>&1)
              if [[ $? -ne 0 ]]; then
                echo "    ❌ $jf — INVALID JSON"
                SYNTAX_ERRORS+="- \`$jf\` — INVALID JSON: ${ERR}"$'\n'
                SYNTAX_COUNT=$((SYNTAX_COUNT + 1))
                SECURITY_EXIT=1
              else
                echo "    ✅ $jf — valid"
              fi
            done <<< "$JSON_FILES"
          fi

          # Validate XML files
          XML_FILES=$(echo "$CHANGED_FILES" | grep -E '\.(xml|pom|csproj|props|targets)$' || true)
          if [[ -n "$XML_FILES" ]]; then
            echo "  Checking XML files..."
            while IFS= read -r xf; do
              [[ -z "$xf" ]] && continue
              [[ ! -f "$xf" ]] && continue
              ERR=$(python3 -c "
          import xml.etree.ElementTree as ET, sys
          try:
              ET.parse('$xf')
          except ET.ParseError as e:
              print(str(e)[:200])
              sys.exit(1)
          " 2>&1)
              if [[ $? -ne 0 ]]; then
                echo "    ❌ $xf — INVALID XML"
                SYNTAX_ERRORS+="- \`$xf\` — INVALID XML: ${ERR}"$'\n'
                SYNTAX_COUNT=$((SYNTAX_COUNT + 1))
                SECURITY_EXIT=1
              else
                echo "    ✅ $xf — valid"
              fi
            done <<< "$XML_FILES"
          fi

          # GitHub Actions workflow validation (check for common issues)
          GHA_FILES=$(echo "$CHANGED_FILES" | grep -E '^\.github/workflows/.*\.(yml|yaml)$' || true)
          if [[ -n "$GHA_FILES" ]]; then
            echo "  Checking GitHub Actions workflows for common issues..."
            while IFS= read -r gf; do
              [[ -z "$gf" ]] && continue
              [[ ! -f "$gf" ]] && continue
              GHA_ISSUES=""
              # Check: must have 'on' trigger
              if ! grep -q "^on:" "$gf" && ! grep -q "^'on':" "$gf" && ! grep -q '^"on":' "$gf"; then
                GHA_ISSUES+="missing 'on' trigger; "
              fi
              # Check: must have 'jobs' section
              if ! grep -q "^jobs:" "$gf"; then
                GHA_ISSUES+="missing 'jobs' section; "
              fi
              # Check: uses references should have version pinning
              UNPINNED=$(grep -n "uses:" "$gf" | grep -v "@" | grep -v "#" || true)
              if [[ -n "$UNPINNED" ]]; then
                GHA_ISSUES+="unpinned action references (missing @version); "
              fi
              if [[ -n "$GHA_ISSUES" ]]; then
                echo "    ⚠️  $gf — ${GHA_ISSUES}"
                SYNTAX_ERRORS+="- \`$gf\` — GHA issues: ${GHA_ISSUES}"$'\n'
                SYNTAX_COUNT=$((SYNTAX_COUNT + 1))
              else
                echo "    ✅ $gf — valid workflow structure"
              fi
            done <<< "$GHA_FILES"
          fi

          if [[ $SYNTAX_COUNT -gt 0 ]]; then
            echo ""
            echo "  ⚠ Found ${SYNTAX_COUNT} syntax/validation issues"
            SECURITY_RESULTS+="### YAML/JSON/XML Validation -- ⚠ ${SYNTAX_COUNT} issues found"$'\n'
            SECURITY_RESULTS+="${SYNTAX_ERRORS}"$'\n'
          elif [[ -n "$YAML_FILES" || -n "$JSON_FILES" || -n "$XML_FILES" || -n "$GHA_FILES" ]]; then
            echo "  ✅ All checked files have valid syntax"
            SECURITY_RESULTS+="### YAML/JSON/XML Validation -- ✅ All valid"$'\n\n'
          else
            echo "  ℹ No YAML/JSON/XML files changed in this PR"
            SECURITY_RESULTS+="### YAML/JSON/XML Validation -- ℹ No files to check"$'\n\n'
          fi

          echo ""
          echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
          echo "┃          SECURITY SCANS COMPLETE                      ┃"
          echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"

          echo "$SECURITY_RESULTS" > /tmp/security-results.txt
          echo "security_exit=$SECURITY_EXIT" >> "$GITHUB_OUTPUT"

      - name: "Dependency Vulnerability Audit"
        if: steps.skip_check.outputs.skip != 'true'
        id: dep_audit
        continue-on-error: true
        run: |
          set +e
          echo ""
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  Dependency Vulnerability Audit                      │"
          echo "└─────────────────────────────────────────────────────┘"
          echo ""

          AUDIT_RESULTS=""
          STACK=$(jq -r '.stack.language // "unknown"' /tmp/ai-commands.json 2>/dev/null)
          PKG_MGR=$(jq -r '.stack.package_manager // "unknown"' /tmp/ai-commands.json 2>/dev/null)

          case "$PKG_MGR" in
            npm|pnpm|yarn)
              echo "  Running npm audit..."
              AUDIT_OUTPUT=$(npm audit --production 2>&1) && AUDIT_EXIT=0 || AUDIT_EXIT=$?
              if [[ $AUDIT_EXIT -ne 0 ]]; then
                VULN_COUNT=$(echo "$AUDIT_OUTPUT" | grep -c "Severity:" 2>/dev/null || echo "?")
                echo "  ⚠ Found vulnerabilities"
                AUDIT_RESULTS="### Dependency Audit (npm) -- ⚠ Vulnerabilities Found"$'\n'
                AUDIT_RESULTS+='```'$'\n'
                AUDIT_RESULTS+="${AUDIT_OUTPUT:0:3000}"$'\n'
                AUDIT_RESULTS+='```'$'\n\n'
              else
                echo "  ✅ No known vulnerabilities"
                AUDIT_RESULTS="### Dependency Audit (npm) -- ✅ PASSED"$'\n\n'
              fi
              ;;
            pip)
              if command -v pip-audit &>/dev/null || pip install pip-audit -q 2>/dev/null; then
                echo "  Running pip-audit..."
                AUDIT_OUTPUT=$(pip-audit 2>&1) && AUDIT_EXIT=0 || AUDIT_EXIT=$?
                if [[ $AUDIT_EXIT -ne 0 ]]; then
                  echo "  ⚠ Found vulnerabilities"
                  AUDIT_RESULTS="### Dependency Audit (pip) -- ⚠ Vulnerabilities Found"$'\n'
                  AUDIT_RESULTS+='```'$'\n'
                  AUDIT_RESULTS+="${AUDIT_OUTPUT:0:3000}"$'\n'
                  AUDIT_RESULTS+='```'$'\n\n'
                else
                  echo "  ✅ No known vulnerabilities"
                  AUDIT_RESULTS="### Dependency Audit (pip) -- ✅ PASSED"$'\n\n'
                fi
              else
                echo "  Skipping pip-audit (not available)"
                AUDIT_RESULTS="### Dependency Audit (pip) -- SKIPPED"$'\n\n'
              fi
              ;;
            *)
              echo "  No dependency audit available for: $PKG_MGR"
              AUDIT_RESULTS="### Dependency Audit -- SKIPPED (unsupported: $PKG_MGR)"$'\n\n'
              ;;
          esac

          echo "$AUDIT_RESULTS" > /tmp/audit-results.txt

      - name: "SonarQube Results (from existing job)"
        if: steps.skip_check.outputs.skip != 'true'
        id: sonarqube
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          set +e
          echo ""
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│  SonarQube Results (from PR checks)                  │"
          echo "└─────────────────────────────────────────────────────┘"
          echo ""

          SONAR_RESULTS=""
          PR_NUMBER="${{ github.event.pull_request.number }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"

          # Strategy: Fetch SonarQube results from the check runs already on this PR
          # The SonarQube job runs separately (on self-hosted runner with internal access)
          # We query GitHub Checks API to get its results

          echo "  Checking for SonarQube results on PR #${PR_NUMBER} (SHA: ${HEAD_SHA:0:7})..."

          # 1. Look for SonarQube check runs via GitHub Checks API
          CHECK_RUNS=$(curl -sS \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/commits/${HEAD_SHA}/check-runs?per_page=100" \
            2>/dev/null)

          if ! echo "$CHECK_RUNS" | jq -e '.check_runs' &>/dev/null; then
            echo "  ⚠ Could not fetch check runs from GitHub API"
            echo "" > /tmp/sonar-results.txt
            echo "sonar_exit=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TOTAL_CHECKS=$(echo "$CHECK_RUNS" | jq '.total_count // 0')
          echo "  Found ${TOTAL_CHECKS} check runs on this commit"

          # Find SonarQube check runs posted by the SonarQube App (NOT our own GitHub Actions jobs)
          # This ensures we only pick up results from the actual SonarQube analysis, not our workflow
          SONAR_CHECKS=$(echo "$CHECK_RUNS" | jq '[.check_runs[] | select(.app.slug != "github-actions") | select(.name | test("sonar|quality.?gate"; "i"))]')
          SONAR_CHECK_COUNT=$(echo "$SONAR_CHECKS" | jq 'length')

          if [[ "$SONAR_CHECK_COUNT" -gt 0 ]]; then
            echo "  ✓ Found ${SONAR_CHECK_COUNT} SonarQube check run(s)"

            # Get the most recent SonarQube check
            SONAR_CHECK=$(echo "$SONAR_CHECKS" | jq '.[0]')
            CHECK_NAME=$(echo "$SONAR_CHECK" | jq -r '.name')
            CHECK_STATUS=$(echo "$SONAR_CHECK" | jq -r '.status')
            CHECK_CONCLUSION=$(echo "$SONAR_CHECK" | jq -r '.conclusion // "pending"')
            CHECK_URL=$(echo "$SONAR_CHECK" | jq -r '.html_url // ""')
            CHECK_DETAILS_URL=$(echo "$SONAR_CHECK" | jq -r '.details_url // ""')
            CHECK_OUTPUT_TITLE=$(echo "$SONAR_CHECK" | jq -r '.output.title // ""')
            CHECK_OUTPUT_SUMMARY=$(echo "$SONAR_CHECK" | jq -r '.output.summary // ""')
            CHECK_OUTPUT_TEXT=$(echo "$SONAR_CHECK" | jq -r '.output.text // ""')

            echo "  Check: ${CHECK_NAME}"
            echo "  Status: ${CHECK_STATUS} | Conclusion: ${CHECK_CONCLUSION}"

            if [[ "$CHECK_STATUS" == "completed" ]]; then
              if [[ "$CHECK_CONCLUSION" == "success" ]]; then
                SONAR_RESULTS="### 📊 SonarQube Quality Gate — ✅ PASSED"$'\n\n'
              elif [[ "$CHECK_CONCLUSION" == "failure" ]]; then
                SONAR_RESULTS="### 📊 SonarQube Quality Gate — ❌ FAILED"$'\n\n'
              elif [[ "$CHECK_CONCLUSION" == "neutral" ]]; then
                SONAR_RESULTS="### 📊 SonarQube Quality Gate — ⚠️ WARNING"$'\n\n'
              else
                SONAR_RESULTS="### 📊 SonarQube — ${CHECK_CONCLUSION}"$'\n\n'
              fi

              # Add output title/summary if available
              if [[ -n "$CHECK_OUTPUT_TITLE" && "$CHECK_OUTPUT_TITLE" != "null" ]]; then
                SONAR_RESULTS+="**${CHECK_OUTPUT_TITLE}**"$'\n\n'
              fi

              if [[ -n "$CHECK_OUTPUT_SUMMARY" && "$CHECK_OUTPUT_SUMMARY" != "null" ]]; then
                # Truncate if too long
                SUMMARY_TRUNCATED="${CHECK_OUTPUT_SUMMARY:0:3000}"
                SONAR_RESULTS+="${SUMMARY_TRUNCATED}"$'\n\n'
              fi

              if [[ -n "$CHECK_OUTPUT_TEXT" && "$CHECK_OUTPUT_TEXT" != "null" && ${#CHECK_OUTPUT_TEXT} -gt 5 ]]; then
                TEXT_TRUNCATED="${CHECK_OUTPUT_TEXT:0:2000}"
                SONAR_RESULTS+="<details><summary>Detailed Analysis</summary>"$'\n\n'
                SONAR_RESULTS+="${TEXT_TRUNCATED}"$'\n\n'
                SONAR_RESULTS+="</details>"$'\n\n'
              fi

              # Add link to full results
              if [[ -n "$CHECK_DETAILS_URL" && "$CHECK_DETAILS_URL" != "null" ]]; then
                SONAR_RESULTS+="🔗 [View full SonarQube analysis](${CHECK_DETAILS_URL})"$'\n\n'
              fi
            elif [[ "$CHECK_STATUS" == "in_progress" || "$CHECK_STATUS" == "queued" ]]; then
              SONAR_RESULTS="### 📊 SonarQube — ⏳ In Progress"$'\n\n'
              SONAR_RESULTS+="SonarQube analysis is still running. Results will be available after completion."$'\n\n'
            fi
          else
            echo "  ℹ No SonarQube check runs found on this commit"

            # 2. Fallback: Check commit statuses (some SonarQube integrations use statuses instead of checks)
            echo "  Checking commit statuses..."
            STATUSES=$(curl -sS \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/commits/${HEAD_SHA}/statuses" \
              2>/dev/null)

            SONAR_STATUSES=$(echo "$STATUSES" | jq '[.[] | select(.context | test("sonar|quality.?gate"; "i"))]' 2>/dev/null)
            SONAR_STATUS_COUNT=$(echo "$SONAR_STATUSES" | jq 'length' 2>/dev/null || echo "0")

            if [[ "$SONAR_STATUS_COUNT" -gt 0 ]]; then
              echo "  ✓ Found ${SONAR_STATUS_COUNT} SonarQube status(es)"

              SONAR_STATUS=$(echo "$SONAR_STATUSES" | jq '.[0]')
              STATUS_STATE=$(echo "$SONAR_STATUS" | jq -r '.state')
              STATUS_DESC=$(echo "$SONAR_STATUS" | jq -r '.description // ""')
              STATUS_URL=$(echo "$SONAR_STATUS" | jq -r '.target_url // ""')
              STATUS_CONTEXT=$(echo "$SONAR_STATUS" | jq -r '.context')

              echo "  Context: ${STATUS_CONTEXT}"
              echo "  State: ${STATUS_STATE}"

              if [[ "$STATUS_STATE" == "success" ]]; then
                SONAR_RESULTS="### 📊 SonarQube Quality Gate — ✅ PASSED"$'\n\n'
              elif [[ "$STATUS_STATE" == "failure" || "$STATUS_STATE" == "error" ]]; then
                SONAR_RESULTS="### 📊 SonarQube Quality Gate — ❌ FAILED"$'\n\n'
              elif [[ "$STATUS_STATE" == "pending" ]]; then
                SONAR_RESULTS="### 📊 SonarQube — ⏳ Pending"$'\n\n'
              fi

              if [[ -n "$STATUS_DESC" && "$STATUS_DESC" != "null" ]]; then
                SONAR_RESULTS+="${STATUS_DESC}"$'\n\n'
              fi

              if [[ -n "$STATUS_URL" && "$STATUS_URL" != "null" ]]; then
                SONAR_RESULTS+="🔗 [View full SonarQube analysis](${STATUS_URL})"$'\n\n'
              fi
            else
              echo "  ℹ No SonarQube statuses found either"
              echo "  ℹ SonarQube may not be configured for this repository, or the job hasn't run yet"
            fi
          fi

          # Write results
          if [[ -z "$SONAR_RESULTS" ]]; then
            echo "  ℹ No SonarQube results available yet"
            echo "  ℹ Ensure SonarQube job runs on this PR (may need a separate workflow with self-hosted runner)"
          fi
          echo "$SONAR_RESULTS" > /tmp/sonar-results.txt
          echo "sonar_exit=0" >> "$GITHUB_OUTPUT"

      - name: "AI Pass 2: Review code and results"
        if: steps.skip_check.outputs.skip != 'true'
        id: pass2
        continue-on-error: true
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
        run: |
          set +e
          echo ""
          echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
          echo "┃          STAGE 6: AI Code Review                      ┃"
          echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
          echo ""

          # Validate secrets
          if [[ -z "$AI_API_ENDPOINT" || -z "$AI_API_KEY" ]]; then
            echo "::warning::AI secrets not configured - skipping AI review"
            echo '{"summary":"AI review skipped - secrets not configured","verdict":"comment","confidence":0,"issues":[],"positives":[],"suggestions":["Configure AI_API_KEY and AI_API_ENDPOINT secrets"]}' > /tmp/ai-review.txt
            exit 0
          fi

          SYSTEM_PROMPT='You are a principal software engineer conducting a thorough pull request review. You have the PR diff, CI results, Docker/Trivy scan results, and security scan results.

          VERDICT RULES (CRITICAL - follow exactly):
          - "approve": PR changes are clean, no issues found in the changed files, AND SonarQube Quality Gate passed (or no SonarQube results available).
          - "needs_work": PR has minor/medium issues that should be fixed (non-blocking suggestions, style issues, minor bugs).
          - "reject": PR introduces critical security vulnerabilities, major logic errors, breaking changes, OR SonarQube Quality Gate FAILED due to issues in the PR changes.
          - ONLY judge the FILES CHANGED in this PR. Pre-existing repo issues go in repo_health, NOT in the verdict.
          - If the only issues are pre-existing (base image CVEs, missing LICENSE, etc.), verdict MUST be "approve".
          - A thin GitHub Actions caller workflow that just references a reusable workflow (uses: org/repo/.github/workflows/file.yml@ref) is a STANDARD PATTERN. If the YAML is syntactically valid and uses version pinning (@main, @v1, @sha), verdict MUST be "approve".
          - Do NOT flag YAML/JSON files as having issues if they pass syntax validation. A "valid YAML" result means no issue exists.
          - Scanner tool failures (e.g., Trivy download failure) are NOT code issues — do not count them against the PR.

          SONARQUBE RULES (CRITICAL):
          - If SonarQube Quality Gate FAILED → verdict MUST be "reject". Explain why in the summary (e.g., security hotspot, coverage threshold, code smells).
          - If SonarQube Quality Gate PASSED → factor positively into verdict.
          - If SonarQube results show "In Progress" or "Pending" → note it in summary but do not penalize.
          - If no SonarQube check run exists on this PR → note "SonarQube not configured" in summary, do not penalize.
          - Always include SonarQube status prominently in your summary (first or second sentence).
          - In the check_results_analysis field, explicitly state the SonarQube Quality Gate outcome and what caused it (e.g., "Quality Gate failed: 1 Security Hotspot").

          REVIEW DIMENSIONS (in order of priority):
          1. SECURITY: OWASP Top 10, hardcoded secrets, SQL/command injection, XSS, SSRF, insecure deserialization, path traversal, missing auth checks
          2. RELIABILITY: Null/undefined handling, error handling, race conditions, resource leaks, infinite loops
          3. CORRECTNESS: Logic errors, off-by-one, wrong comparisons, missing edge cases
          4. PERFORMANCE: N+1 queries, unnecessary re-renders, missing indexes, large allocations in loops
          5. MAINTAINABILITY: Code duplication, unclear naming, missing types, complex conditionals
          6. TESTING: Untested critical paths, missing edge case tests, flaky test patterns
          7. BREAKING CHANGES: API contract changes, schema migrations, env var changes

          GUIDELINES:
          - Be specific: reference exact file paths and line numbers from the diff
          - CLEARLY separate: a) issues in the PR changes, b) pre-existing repository issues
          - If you mention an issue in the summary, you MUST include it in the issues array with full details
          - Every issue must have: file, line (if applicable), title, description, and suggestion
          - If dependency install failed, note that check failures may not reflect actual code issues
          - If Trivy found vulnerabilities in base images (not introduced by this PR), note them in repo_health but do NOT mark as PR issues
          - If gitleaks found secrets IN THE PR DIFF, flag as CRITICAL. If secrets are pre-existing, note in repo_health.
          - Provide actionable fix suggestions with code snippets where possible
          - Be constructive: acknowledge good patterns and improvements

          Return ONLY valid JSON (no markdown fences):
          {"summary":"2-3 sentence summary of PR quality","verdict":"approve|needs_work|reject","confidence":0.85,"check_results_analysis":"what CI results mean for this PR","security_analysis":"summary of security scan findings for PR changes","repo_health":{"status":"healthy|needs_attention|critical","summary":"2-3 sentence overall repository health assessment","issues":["pre-existing issue 1 with specific details","pre-existing issue 2"],"recommendations":["actionable recommendation 1"]},"issues":[{"severity":"critical|high|medium|low|info","file":"path/to/file.ext","line":42,"title":"Short descriptive title","description":"Detailed explanation of the issue and why it matters","suggestion":"Specific fix: code snippet or clear approach","is_pr_change":true}],"positives":["things done well"],"suggestions":["non-blocking improvements"]}'

          PR_DIFF=$(cat /tmp/pr-diff.txt 2>/dev/null || echo "")
          CHECK_RESULTS=$(cat /tmp/check-results.txt 2>/dev/null || echo "No checks were run")
          CONFIG_FILES=$(cat /tmp/config-files.txt 2>/dev/null || echo "")
          DOCKER_RESULTS=$(cat /tmp/docker-results.txt 2>/dev/null || echo "")
          SECURITY_RESULTS=$(cat /tmp/security-results.txt 2>/dev/null || echo "No security scans were run")
          AUDIT_RESULTS=$(cat /tmp/audit-results.txt 2>/dev/null || echo "")
          SONAR_RESULTS=$(cat /tmp/sonar-results.txt 2>/dev/null || echo "")

          USER_MSG="## Pull Request: ${{ github.event.pull_request.title }}
          Author: ${{ github.event.pull_request.user.login }}
          Base: ${{ github.base_ref }} <- ${{ github.head_ref }}
          Setup failed: ${{ steps.checks.outputs.setup_failed }}

          ## Repository Config Files
          ${CONFIG_FILES:0:10000}

          ## Code Changes (diff)
          ${PR_DIFF:0:30000}

          ## CI Check Results (just executed)
          ${CHECK_RESULTS:0:10000}

          ## Docker Build & Trivy Scan Results
          ${DOCKER_RESULTS:0:5000}

          ## Security Scan Results (Gitleaks, Sensitive Files, EOF, Large Files)
          ${SECURITY_RESULTS:0:5000}

          ## Dependency Vulnerability Audit
          ${AUDIT_RESULTS:0:3000}

          ## SonarQube Analysis Results
          ${SONAR_RESULTS:0:5000}

          Review this PR thoroughly. Pay special attention to any security findings from gitleaks or Trivy, flag dependency vulnerabilities, and analyze SonarQube findings if available."

          RESPONSE=$(curl -sS -X POST "${AI_API_ENDPOINT}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AI_API_KEY}" \
            --max-time 120 \
            -d "$(jq -n \
              --arg system "$SYSTEM_PROMPT" \
              --arg user "$USER_MSG" \
              '{
                "model": "gpt-4.1",
                "messages": [
                  {"role": "system", "content": $system},
                  {"role": "user", "content": $user}
                ],
                "temperature": 0.1,
                "max_tokens": 4096
              }')" 2>/tmp/curl-error2.txt)
          CURL_EXIT=$?

          if [[ $CURL_EXIT -ne 0 ]]; then
            echo "::warning::curl failed in Pass 2 with exit code $CURL_EXIT"
            echo '{"summary":"AI review failed - API call error","verdict":"comment","confidence":0,"issues":[],"positives":[],"suggestions":[]}' > /tmp/ai-review.txt
          else
            REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null)
            if [[ -z "$REVIEW" ]]; then
              echo "::warning::AI Pass 2 returned empty response"
              echo '{"summary":"AI review could not be generated","verdict":"comment","confidence":0,"issues":[],"positives":[],"suggestions":[]}' > /tmp/ai-review.txt
            else
              echo "$REVIEW" > /tmp/ai-review.txt
              echo "  AI review generated successfully"
            fi
          fi

      - name: Post review to PR
        if: always() && steps.skip_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = '{}', checks = 'No results', commands = {}, dockerResults = '', securityResults = '', auditResults = '', sonarResults = '';
            try { review = fs.readFileSync('/tmp/ai-review.txt', 'utf8'); } catch(e) {}
            try { checks = fs.readFileSync('/tmp/check-results.txt', 'utf8'); } catch(e) {}
            try { commands = JSON.parse(fs.readFileSync('/tmp/ai-commands.json', 'utf8')); } catch(e) {}
            try { dockerResults = fs.readFileSync('/tmp/docker-results.txt', 'utf8').trim(); } catch(e) {}
            try { securityResults = fs.readFileSync('/tmp/security-results.txt', 'utf8').trim(); } catch(e) {}
            try { auditResults = fs.readFileSync('/tmp/audit-results.txt', 'utf8').trim(); } catch(e) {}
            try { sonarResults = fs.readFileSync('/tmp/sonar-results.txt', 'utf8').trim(); } catch(e) {}

            const passed = '${{ steps.checks.outputs.passed }}' || '0';
            const failed = '${{ steps.checks.outputs.failed }}' || '0';
            const checksExit = '${{ steps.checks.outputs.exit_code }}' || '0';
            const setupFailed = '${{ steps.checks.outputs.setup_failed }}' === 'true';
            const dockerFound = '${{ steps.docker.outputs.docker_found }}' === 'true';
            const dockerExit = '${{ steps.docker.outputs.docker_exit }}' || '0';
            const securityExit = '${{ steps.security.outputs.security_exit }}' || '0';
            const prSize = '${{ steps.context.outputs.pr_size }}' || 'normal';
            const diffLines = '${{ steps.context.outputs.diff_lines }}' || '0';
            const changedFiles = '${{ steps.context.outputs.changed_files }}' || '0';

            // Calculate pipeline duration
            const startTime = parseInt('${{ steps.timer.outputs.start }}' || '0');
            const duration = startTime ? Math.round((Date.now() / 1000) - startTime) : 0;
            const durationStr = duration > 60 ? `${Math.floor(duration/60)}m ${duration%60}s` : `${duration}s`;

            let reviewData = {};
            try {
              const cleaned = review.replace(/^```json\n?/, '').replace(/\n?```$/, '');
              reviewData = JSON.parse(cleaned);
            } catch(e) {
              reviewData = { summary: review.substring(0, 500), verdict: 'comment', confidence: 0, issues: [], positives: [], suggestions: [] };
            }

            const stackInfo = commands.stack
              ? `${commands.stack.language || '?'} / ${commands.stack.framework || '?'} / ${commands.stack.package_manager || '?'}`
              : 'Unknown';

            // Multi-stack display for monorepos
            const allStacks = (commands.stacks || []);
            const multiStackInfo = allStacks.length > 1
              ? '\n\n**Detected Stacks:**\n' + allStacks.map(s => `- ${s.language}${s.framework ? ' / ' + s.framework : ''} (\`${s.directory || 'root'}\`)`).join('\n') + '\n'
              : '';

            const cmdList = (commands.check_commands || [])
              .map((c, i) => [
                `${i+1}. \`${c.cmd}\``,
                `   - **Purpose:** ${c.purpose}`,
                `   - **Confidence:** ${c.confidence}`,
                ''
              ].join('\n'))
              .join('\n');

            const verdictMap = { approve: ['\u2705', 'APPROVED'], needs_work: ['\u26a0\ufe0f', 'NEEDS WORK'], reject: ['\ud83d\udd34', 'CHANGES REQUIRED'] };
            const [verdictEmoji, verdictLabel] = verdictMap[reviewData.verdict] || ['\u2139\ufe0f', 'REVIEW'];
            const statusEmoji = checksExit === '0' ? '\u2705' : (setupFailed ? '\u26a0\ufe0f' : '\u274c');

            const issuesList = (reviewData.issues || []).map(i => {
              const sev = { critical: '\ud83d\udea8', high: '\ud83d\udd34', medium: '\ud83d\udfe1', low: '\ud83d\udd35', info: '\u2139\ufe0f' }[i.severity] || '-';
              const loc = i.file ? `\`${i.file}${i.line ? ':' + i.line : ''}\`` : '';
              return `${sev} **${i.title}** ${loc}\n   ${i.description}${i.suggestion ? '\n   \ud83d\udca1 ' + i.suggestion : ''}`;
            }).join('\n\n');

            const positives = (reviewData.positives || []).map(p => `- ${p}`).join('\n');
            const suggestions = (reviewData.suggestions || []).map(s => `- ${s}`).join('\n');

            // Repository Health section (pre-existing issues, not PR-specific)
            const repoHealth = reviewData.repo_health || {};
            const healthEmoji = { healthy: '\u2705', needs_attention: '\u26a0\ufe0f', critical: '\ud83d\udea8' }[repoHealth.status] || '\u2139\ufe0f';
            const repoHealthSection = repoHealth.summary ? [
              `### \ud83c\udfe5 Repository Health \u2014 ${healthEmoji} ${(repoHealth.status || 'unknown').replace('_', ' ').toUpperCase()}`,
              '',
              `> ${repoHealth.summary}`,
              '',
              (repoHealth.issues || []).length > 0 ? '**Pre-existing issues (not introduced by this PR):**\n' + repoHealth.issues.map(i => `- ${i}`).join('\n') + '\n' : '',
              (repoHealth.recommendations || []).length > 0 ? '**Recommendations:**\n' + repoHealth.recommendations.map(r => `- ${r}`).join('\n') + '\n' : '',
            ].filter(Boolean).join('\n') : '';

            // PR size warning
            const sizeWarning = prSize === 'very_large'
              ? `\n> \u26a0\ufe0f **Large PR** (${diffLines} lines across ${changedFiles} files). Consider splitting for better review quality.\n`
              : prSize === 'large'
              ? `\n> \ud83d\udcdd PR has ${diffLines} lines across ${changedFiles} files.\n`
              : '';

            const body = [
              `## \ud83e\udd16 AI Code Review \u2014 ${verdictEmoji} ${verdictLabel}`,
              '',
              `> ${reviewData.summary || 'Review complete.'}`,
              sizeWarning,
              `| Stack | Checks | Security | Confidence | Duration |`,
              `|-------|--------|----------|------------|----------|`,
              `| ${stackInfo} | ${statusEmoji} ${passed} passed, ${failed} failed | ${securityExit === '0' ? '\u2705' : '\u26a0\ufe0f'} | ${Math.round((reviewData.confidence || 0) * 100)}% | ${durationStr} |`,
              multiStackInfo,
              '',
              repoHealthSection,
              '',
              reviewData.check_results_analysis ? `### CI Analysis\n${reviewData.check_results_analysis}\n` : '',
              reviewData.security_analysis ? `### Security Analysis\n${reviewData.security_analysis}\n` : '',
              issuesList ? `### Issues Found\n\n${issuesList}\n` : '',
              positives ? `### \u2705 What\u2019s Good\n\n${positives}\n` : '',
              suggestions ? `### \ud83d\udca1 Suggestions\n\n${suggestions}\n` : '',
              '',
              '<details><summary>\ud83d\udccb Commands AI decided to run</summary>',
              '',
              cmdList || '_None generated_',
              '',
              '</details>',
              '',
              '<details><summary>\ud83d\udcca Full Check Output</summary>',
              '',
              checks,
              '',
              '</details>',
              '',
              dockerFound ? '<details><summary>\ud83d\udc33 Docker Build & Trivy Scan</summary>\n\n' + dockerResults + '\n\n</details>\n' : '',
              securityResults ? '<details><summary>\ud83d\udd12 Security & File Hygiene Scans</summary>\n\n' + securityResults + '\n\n</details>\n' : '',
              auditResults ? '<details><summary>\ud83d\udce6 Dependency Vulnerability Audit</summary>\n\n' + auditResults + '\n\n</details>\n' : '',
              sonarResults ? '<details><summary>\ud83d\udcca SonarQube Analysis</summary>\n\n' + sonarResults + '\n\n</details>\n' : '',
              '',
              '---',
              `<sub>\ud83e\udd16 Powered by <a href="https://github.com/bayer-int/agentic-review">agentic-review</a> | Informational only \u2014 does not block merging | ${changedFiles} files, ${diffLines} lines reviewed in ${durationStr}</sub>`,
            ].filter(Boolean).join('\n');

            // Update existing comment instead of creating a new one (prevent spam)
            const COMMENT_MARKER = '## \ud83e\udd16 AI Code Review';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 50
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith(COMMENT_MARKER)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
              console.log('Updated existing review comment #' + existingComment.id);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
              console.log('Created new review comment on PR #' + context.issue.number);
            }

      - name: Write step summary
        if: always()
        run: |
          set +e

          # Calculate duration
          START="${{ steps.timer.outputs.start }}"
          if [[ -n "$START" ]]; then
            DURATION=$(( $(date +%s) - START ))
            DURATION_STR="${DURATION}s"
            [[ $DURATION -gt 60 ]] && DURATION_STR="$((DURATION/60))m $((DURATION%60))s"
          else
            DURATION_STR="N/A"
          fi

          {
            echo "## 🤖 AI Code Review Dashboard"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"

            LANG=$(jq -r '.stack.language // "unknown"' /tmp/ai-commands.json 2>/dev/null || echo "unknown")
            FRAMEWORK=$(jq -r '.stack.framework // "unknown"' /tmp/ai-commands.json 2>/dev/null || echo "unknown")
            PKG=$(jq -r '.stack.package_manager // "unknown"' /tmp/ai-commands.json 2>/dev/null || echo "unknown")
            echo "| **Stack** | ${LANG} / ${FRAMEWORK} / ${PKG} |"

            PASSED="${{ steps.checks.outputs.passed }}"
            FAILED="${{ steps.checks.outputs.failed }}"
            EXIT_CODE="${{ steps.checks.outputs.exit_code }}"
            if [[ -z "$PASSED" && -z "$FAILED" ]]; then
              echo "| **Checks** | No checks executed |"
            elif [[ "$EXIT_CODE" == "0" ]]; then
              echo "| **Checks** | ✅ All ${PASSED} passed |"
            else
              echo "| **Checks** | ⚠️ ${PASSED} passed, ${FAILED} failed |"
            fi

            echo "| **Security** | Exit: ${{ steps.security.outputs.security_exit }} |"
            echo "| **Docker** | Found: ${{ steps.docker.outputs.docker_found }}, Exit: ${{ steps.docker.outputs.docker_exit }} |"
            echo "| **Duration** | ${DURATION_STR} |"
            echo "| **PR Size** | ${{ steps.context.outputs.diff_lines }} lines, ${{ steps.context.outputs.changed_files }} files |"
            echo ""
            echo "### Commands Executed"
            jq -r '.check_commands[]? | "- `\(.cmd)` — \(.purpose)"' /tmp/ai-commands.json 2>/dev/null || echo "- _None_"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Done
        if: always()
        run: |
          echo ""
          echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
          echo "┃          AI REVIEW PIPELINE COMPLETE                   ┃"
          echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
          echo ""
          echo "  Checks: ${{ steps.checks.outputs.passed }} passed, ${{ steps.checks.outputs.failed }} failed"
          echo "  Security: exit=${{ steps.security.outputs.security_exit }}"
          echo "  Docker: found=${{ steps.docker.outputs.docker_found }}, exit=${{ steps.docker.outputs.docker_exit }}"
          echo "  Review posted to PR #${{ github.event.pull_request.number }}"
          echo ""
